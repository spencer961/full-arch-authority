<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Full-Arch Authority</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg-primary:#ffffff;
    --bg-secondary:#f5f5f4;
    --bg-tertiary:#eeede9;
    --text-primary:#1a1a1a;
    --text-secondary:#555553;
    --text-tertiary:#888786;
    --border-light:rgba(0,0,0,0.12);
    --border-mid:rgba(0,0,0,0.22);
    --border-strong:rgba(0,0,0,0.35);
    --radius-md:8px;
    --radius-lg:12px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg-primary:#1c1c1e;
      --bg-secondary:#2c2c2e;
      --bg-tertiary:#3a3a3c;
      --text-primary:#f2f2f7;
      --text-secondary:#aeaeb2;
      --text-tertiary:#636366;
      --border-light:rgba(255,255,255,0.1);
      --border-mid:rgba(255,255,255,0.18);
      --border-strong:rgba(255,255,255,0.28);
    }
  }
  body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;}
  .app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem;}
  .page-title{font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;}
  .page-title span{font-size:13px;font-weight:400;color:var(--text-tertiary);}

  /* top bar */
  .top-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;}
  .top-bar input{height:36px;padding:0 12px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-size:13px;min-width:160px;font-family:var(--font);}
  .top-bar input:focus{outline:none;border-color:var(--border-strong);}
  .btn-primary{height:36px;padding:0 16px;border:none;border-radius:var(--radius-md);background:var(--text-primary);color:var(--bg-primary);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;}
  .btn-primary:hover{opacity:.82;}
  .btn-ghost{height:36px;padding:0 14px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);}
  .btn-ghost:hover{background:var(--bg-secondary);}

  /* tabs */
  .view-tabs{display:flex;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);overflow:hidden;width:fit-content;margin-bottom:1.25rem;}
  .vtab{padding:8px 18px;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--text-secondary);border-right:0.5px solid var(--border-light);font-family:var(--font);}
  .vtab:last-child{border-right:none;}
  .vtab.active{background:var(--text-primary);color:var(--bg-primary);}

  /* pills */
  .pill-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .pill{padding:5px 14px;border:0.5px solid var(--border-mid);border-radius:999px;background:var(--bg-primary);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);}
  .pill:hover{background:var(--bg-secondary);}
  .pill.active{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary);}

  /* grid & cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .card{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem 1.1rem;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  .card:hover{border-color:var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .card-head{display:flex;align-items:center;gap:10px;}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
  .client-name{font-size:14px;font-weight:500;color:var(--text-primary);flex:1;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text-tertiary);padding:3px 5px;border-radius:4px;font-size:14px;line-height:1;font-family:var(--font);}
  .icon-btn:hover{color:var(--text-secondary);background:var(--bg-secondary);}

  /* link chips */
  .link-chip{display:flex;align-items:center;gap:5px;padding:6px 9px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-secondary);font-size:12px;}
  .chip-label{flex:1;color:var(--text-primary);}
  .chip-cat{font-size:11px;color:var(--text-tertiary);}
  .add-row{display:flex;align-items:center;gap:5px;padding:5px 9px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);color:var(--text-tertiary);font-size:12px;cursor:pointer;background:none;width:100%;font-family:var(--font);}
  .add-row:hover{color:var(--text-secondary);}

  /* category view */
  .cat-section{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;}
  .cat-head{padding:10px 14px;background:var(--bg-secondary);border-bottom:0.5px solid var(--border-light);display:flex;align-items:center;gap:8px;}
  .cat-title{font-size:13px;font-weight:500;color:var(--text-primary);flex:1;}
  .cat-count{font-size:11px;color:var(--text-tertiary);}
  .crow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border-light);}
  .crow:last-child{border-bottom:none;}
  .crow-name{font-size:13px;color:var(--text-primary);flex:1;}
  .crow-url{font-size:11px;color:var(--text-tertiary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .open-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font);white-space:nowrap;}
  .open-btn:hover{background:var(--bg-secondary);}

  /* queue */
  .queue-notice{background:var(--bg-secondary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:.9rem 1.1rem;font-size:13px;color:var(--text-secondary);margin-bottom:1rem;line-height:1.6;}
  .q-section-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
  .q-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);margin-bottom:6px;}
  .q-num{width:20px;height:20px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-tertiary);}
  .q-info{flex:1;}
  .q-client{font-size:13px;font-weight:500;color:var(--text-primary);}
  .q-cat{font-size:11px;color:var(--text-tertiary);}

  /* detail view */
  .back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;background:none;border:none;margin-bottom:1.25rem;font-family:var(--font);padding:0;}
  .back-btn:hover{color:var(--text-primary);}
  .detail-header{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .detail-name{font-size:20px;font-weight:600;color:var(--text-primary);}
  .detail-sub{font-size:13px;color:var(--text-tertiary);margin-top:3px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;}
  @media(max-width:500px){.detail-grid{grid-template-columns:1fr;}}
  .detail-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:.9rem 1rem;}
  .detail-card-title{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .detail-card-val{font-size:13px;color:var(--text-primary);line-height:1.6;}
  .detail-section-title{font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .links-table{display:flex;flex-direction:column;gap:6px;}
  .lt-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);flex-wrap:wrap;}
  .lt-label{font-size:13px;color:var(--text-primary);flex:1;min-width:80px;}
  .lt-cat{font-size:11px;color:var(--text-tertiary);background:var(--bg-secondary);border-radius:4px;padding:2px 7px;}
  .lt-url{font-size:11px;color:var(--text-tertiary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
  .modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-mid);padding:1.5rem;width:100%;max-width:420px;display:flex;flex-direction:column;gap:13px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:16px;font-weight:600;color:var(--text-primary);}
  .fgroup{display:flex;flex-direction:column;gap:5px;}
  .flabel{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;}
  .modal input,.modal select,.modal textarea{padding:8px 11px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;width:100%;font-family:var(--font);}
  .modal textarea{resize:vertical;min-height:72px;line-height:1.5;}
  .modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--border-strong);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
  .m-cancel{height:34px;padding:0 14px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);}
  .m-save{height:34px;padding:0 16px;border:none;border-radius:var(--radius-md);background:var(--text-primary);color:var(--bg-primary);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;}
  .m-danger{height:34px;padding:0 14px;border:0.5px solid rgba(163,45,45,0.3);border-radius:var(--radius-md);background:transparent;color:#A32D2D;font-size:13px;cursor:pointer;margin-right:auto;font-family:var(--font);}
  .empty{text-align:center;padding:3rem;color:var(--text-tertiary);font-size:13px;}
  .muted{color:var(--text-tertiary);font-style:italic;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const COLORS=[
  {bg:'#E6F1FB',txt:'#0C447C'},{bg:'#E1F5EE',txt:'#085041'},{bg:'#FAECE7',txt:'#712B13'},
  {bg:'#FBEAF0',txt:'#72243E'},{bg:'#FAEEDA',txt:'#633806'},{bg:'#EAF3DE',txt:'#274F0A'},
  {bg:'#EEEDFE',txt:'#3C3489'},{bg:'#FCEBEB',txt:'#791F1F'},{bg:'#F1EFE8',txt:'#444441'}
];

const DEFAULTS={
  clients:[
    {id:1,name:'4M Dental Implant Center',ci:0,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:2,name:'Aesthetic Oral Arts',ci:1,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:3,name:'Capital Dental',ci:2,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:4,name:'Dynamic Services Dental Group',ci:3,info:{doctor:'',staff:'',timezone:'',locations:'Odessa Family Dental, St. Joseph Advanced Dental Center',numLocations:'2',notes:'Two practices under this client.'}},
    {id:5,name:'Jeffrey S. Burns',ci:4,info:{doctor:'Jeffrey S. Burns',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:6,name:'New Smile Now',ci:5,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:7,name:'SWOSA',ci:6,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:8,name:'Texas Sedation Dentistry',ci:7,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
    {id:9,name:'Wolf Dental Wellness',ci:8,info:{doctor:'',staff:'',timezone:'',locations:'',numLocations:'',notes:''}},
  ],
  links:[
    {id:1,clientId:1,label:'Success Map',category:'Success Map',url:''},
    {id:2,clientId:1,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:3,clientId:2,label:'Success Map',category:'Success Map',url:''},
    {id:4,clientId:2,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:5,clientId:3,label:'Success Map',category:'Success Map',url:''},
    {id:6,clientId:3,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:7,clientId:4,label:'Success Map',category:'Success Map',url:''},
    {id:8,clientId:4,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:9,clientId:5,label:'Success Map',category:'Success Map',url:''},
    {id:10,clientId:5,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:11,clientId:6,label:'Success Map',category:'Success Map',url:''},
    {id:12,clientId:6,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:13,clientId:7,label:'Success Map',category:'Success Map',url:''},
    {id:14,clientId:7,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:15,clientId:8,label:'Success Map',category:'Success Map',url:''},
    {id:16,clientId:8,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:17,clientId:9,label:'Success Map',category:'Success Map',url:''},
    {id:18,clientId:9,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
  ],
  nCid:10,
  nLid:19
};

const DEFAULT_FIELDS=[
  {key:'doctor',label:'Doctor / primary contact',type:'text',placeholder:'Dr. Jane Smith'},
  {key:'staff',label:'Staff / team contacts',type:'text',placeholder:'Office manager, coordinator...'},
  {key:'timezone',label:'Time zone',type:'timezone',placeholder:''},
  {key:'numLocations',label:'No. of locations',type:'text',placeholder:'e.g. 1'},
  {key:'locations',label:'Practice location names',type:'textarea',placeholder:'e.g. Main Office, North Branch'},
  {key:'notes',label:'Notes',type:'textarea',placeholder:'Any other info...'},
];

const SUPABASE_URL='https://jpeanlmbfylihxsvuamm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwZWFubG1iZnlsaWh4c3Z1YW1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzMyNjYsImV4cCI6MjA5MTQwOTI2Nn0.04wuHxGHuScKupZModEFC67snGlc1XKyy1-y0IUX3OM';
const SB_HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=representation'};
const STATE_ID='gmj_main';

let S=JSON.parse(localStorage.getItem('gmj_dashboard')||'null')||JSON.parse(JSON.stringify(DEFAULTS));
let view='clients',filter='all',detailId=null,editMode=false,clientMode=false,clientModeId=null;
let _syncTimer=null,_syncStatus='idle';

function save(){
  localStorage.setItem('gmj_dashboard',JSON.stringify(S));
  setSyncStatus('saving');
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(pushToSupabase,800);
}

function setSyncStatus(status){
  _syncStatus=status;
  const el=document.getElementById('sync-status');
  if(!el)return;
  const map={idle:'',saving:'⏳ Saving…',saved:'✓ Saved',error:'⚠ Sync error'};
  el.textContent=map[status]||'';
  el.style.color=status==='error'?'#A32D2D':status==='saved'?'#3B6D11':'var(--text-tertiary)';
}

async function pushToSupabase(){
  try{
    const payload={id:STATE_ID,data:S,updated_at:new Date().toISOString()};
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state`,{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'),2500);
  }catch(e){
    setSyncStatus('error');
    console.error('Supabase sync error:',e);
  }
}

async function loadFromSupabase(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.${STATE_ID}&select=data`,{headers:SB_HEADERS});
    const rows=await res.json();
    if(rows&&rows.length&&rows[0].data){
      S=rows[0].data;
      localStorage.setItem('gmj_dashboard',JSON.stringify(S));
      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('idle'),2000);
      render();
    }
  }catch(e){
    console.warn('Could not load from Supabase, using local data:',e);
    setSyncStatus('error');
  }
}
function ini(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function cats(){return[...new Set(S.links.map(l=>l.category))].sort();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function val(id){return(document.getElementById(id)||{}).value||'';}

function confirmEnableEditMode(){
  showModal(`
    <h3>Enable link editing?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will show edit and delete controls on all spreadsheet links. Make sure you only make changes you intend to.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="editMode=true;closeModal();render()">Enable editing</button>
    </div>`);
}

function enterClientMode(id){clientMode=true;clientModeId=id;filter=id;view='clients';editMode=false;closeModal();render();}

function tryExitClientMode(){
  showModal(`
    <h3 style="text-align:center;margin-bottom:4px;">End Client Mode?</h3>
    <p style="font-size:13px;color:var(--text-secondary);text-align:center;line-height:1.5;margin-bottom:4px;">You'll return to the full dashboard.</p>
    <div class="modal-actions" style="justify-content:center;gap:12px;margin-top:8px;">
      <button class="m-cancel" style="min-width:80px;" onclick="closeModal()">Cancel</button>
      <button class="m-save" style="min-width:80px;" onclick="clientMode=false;clientModeId=null;filter='all';closeModal();render()">Exit</button>
    </div>`);
}

function openClientModeSelector(){
  const opts=S.clients.map(c=>{
    const col=COLORS[c.ci%COLORS.length];
    return`<button onclick="enterClientMode(${c.id})" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-size:13px;cursor:pointer;font-family:var(--font);margin-bottom:6px;text-align:left;">
      <div style="width:30px;height:30px;border-radius:50%;background:${col.bg};color:${col.txt};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;">${ini(c.name)}</div>
      <span style="font-weight:500;">${esc(c.name)}</span>
    </button>`;
  }).join('');
  showModal(`
    <h3>Select a client</h3>
    <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px;">Dashboard will show only that client's info.</p>
    <div>${opts}</div>
    <div class="modal-actions"><button class="m-cancel" onclick="closeModal()">Cancel</button></div>`);
}

function render(){
  const app=document.getElementById('app');
  if(detailId!==null){renderDetail(app);return;}

  if(clientMode){
    const c=S.clients.find(x=>x.id===clientModeId);
    const col=c?COLORS[c.ci%COLORS.length]:{bg:'#eee',txt:'#333'};
    let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;">
      ${c?`<div style="width:32px;height:32px;border-radius:50%;background:${col.bg};color:${col.txt};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;">${ini(c.name)}</div>
      <span style="font-size:16px;font-weight:600;color:var(--text-primary);">${esc(c.name)}</span>`:''}
      <button class="btn-primary" onclick="tryExitClientMode()" style="margin-left:auto;background:#1a1a1a;display:flex;align-items:center;gap:6px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;"></span>
        Client Mode
      </button>
    </div>`;
    html+='<div id="main"></div>';
    app.innerHTML=html;
    renderClients();
    return;
  }

  let html=`<div class="page-title">Full-Arch Authority <span>Client Dashboard</span> <span id="sync-status" style="font-size:11px;margin-left:8px;transition:color .3s;"></span></div>
  <div class="top-bar">
    <input id="nc-inp" placeholder="New client name" onkeydown="if(event.key==='Enter')addClient()"/>
    <button class="btn-primary" onclick="addClient()">Add client</button>
    <button class="btn-ghost" onclick="openLinkModal(null,null)">+ Add link</button>
    <button class="${editMode?'btn-primary':'btn-ghost'}" onclick="${editMode?'editMode=false;render()':'confirmEnableEditMode()'}">
      <span style="display:inline-block;transform:scaleX(-1);">✎</span>&nbsp;${editMode?'Editing on':'Edit links'}
    </button>
    <button class="btn-ghost" onclick="openClientModeSelector()" style="margin-left:auto;border-color:var(--border-mid);">Client Mode</button>
    <button class="btn-ghost" onclick="exportBackup()" title="Download a full backup of all your data">⬇ Export</button>
    <button class="btn-ghost" onclick="document.getElementById('import-file').click()" title="Restore from a backup file">⬆ Import</button>
    <button class="btn-ghost" onclick="debugRecoverData()" title="Scan for recoverable data" style="color:#A32D2D;border-color:rgba(163,45,45,0.3);">⚠ Recover</button>
    <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importBackup(this)"/>
  </div>
  <div class="view-tabs">
    <button class="vtab${view==='clients'?' active':''}" onclick="switchView('clients')">By client</button>
    <button class="vtab${view==='category'?' active':''}" onclick="switchView('category')">By category</button>
    <button class="vtab${view==='queue'?' active':''}" onclick="switchView('queue')">Work queue</button>
  </div>`;

  if(view!=='queue'){
    const items=view==='clients'
      ?S.clients.map(c=>({id:c.id,label:c.name,isNum:true}))
      :cats().map(c=>({id:c,label:c,isNum:false}));
    html+=`<div class="pill-bar"><button class="pill${filter==='all'?' active':''}" onclick="setFilter('all')">All</button>`;
    items.forEach(it=>{
      const active=String(filter)===String(it.id);
      const onclick=it.isNum?`setFilter(${it.id})`:`setFilter(decodeURIComponent('${encodeURIComponent(it.id)}'))`;
      html+=`<button class="pill${active?' active':''}" onclick="${onclick}">${esc(it.label)}</button>`;
    });
    html+='</div>';
  }

  html+='<div id="main"></div>';
  app.innerHTML=html;

  if(view==='clients') renderClients();
  else if(view==='category') renderCategory();
  else renderQueue();
}

function renderClients(){
  const visible=filter==='all'?S.clients:S.clients.filter(c=>String(c.id)===String(filter));
  if(!visible.length){document.getElementById('main').innerHTML='<div class="empty">No clients yet. Add one above.</div>';return;}
  let html='<div class="grid">';
  visible.forEach(c=>{
    const col=COLORS[c.ci%COLORS.length];
    const links=S.links.filter(l=>l.clientId===c.id);
    let chips=links.slice(0,4).map(l=>`
      <div class="link-chip" onclick="event.stopPropagation();if(event.target.closest('.icon-btn'))return;${l.url?`window.open('${esc(l.url)}','_blank')`:'openLinkModal('+l.id+',null)'}" style="cursor:pointer;" title="${l.url?esc(l.url):'No URL yet — click to add'}">
        <svg style="width:13px;height:13px;flex-shrink:0;opacity:${l.url?'0.5':'0.25'};" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="5.5" x2="13" y2="5.5" stroke="currentColor" stroke-width="1"/><line x1="5" y1="5.5" x2="5" y2="12" stroke="currentColor" stroke-width="1"/></svg>
        <span class="chip-label" style="color:${l.url?'var(--text-primary)':'var(--text-tertiary)'};">${esc(l.label)}</span>
        ${!l.url?'<span style="font-size:10px;color:var(--text-tertiary);font-style:italic;">no url</span>':''}
        ${editMode&&!clientMode?`<button class="icon-btn" onclick="event.stopPropagation();openLinkModal(${l.id},null)" title="Edit" style="transform:scaleX(-1);">✎</button>
        <button class="icon-btn" onclick="event.stopPropagation();deleteLink(${l.id})" title="Delete">×</button>`:''}
      </div>`).join('');
    if(links.length>4) chips+=`<div style="font-size:11px;color:var(--text-tertiary);padding:2px 4px;">+${links.length-4} more — click card to view all</div>`;
    const inf=c.info||{};
    const metaParts=[inf.doctor,inf.timezone?inf.timezone.split('—')[0].trim():''].filter(Boolean);
    const metaLine=metaParts.length?`<div style="font-size:11px;color:var(--text-tertiary);margin-top:1px;line-height:1.4;">${esc(metaParts.join(' · '))}</div>`:'';
    html+=`<div class="card" onclick="openDetail(${c.id})">
      <div class="card-head">
        <div class="avatar" style="width:34px;height:34px;font-size:12px;background:${col.bg};color:${col.txt};">${ini(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="client-name">${esc(c.name)}</div>
          ${metaLine}
        </div>
        ${clientMode?'':` <button class="icon-btn" onclick="event.stopPropagation();openClientModal(${c.id})" title="Edit" style="transform:scaleX(-1);">✎</button>`}
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${chips||'<div style="font-size:12px;color:var(--text-tertiary);font-style:italic;padding:2px 0;">No files yet</div>'}
        ${editMode&&!clientMode?`<button class="add-row" onclick="event.stopPropagation();openLinkModal(null,${c.id})"><span style="font-size:15px;line-height:1;">+</span>&nbsp;Add link</button>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('main').innerHTML=html;
}

function renderCategory(){
  const allCats=cats();
  const visible=filter==='all'?allCats:allCats.filter(c=>String(c)===String(filter));
  if(!visible.length){document.getElementById('main').innerHTML='<div class="empty">No categories yet. Add links first.</div>';return;}
  let html='';
  visible.forEach(cat=>{
    const catLinks=S.links.filter(l=>l.category===cat);
    let rows='';
    catLinks.forEach(l=>{
      const client=S.clients.find(c=>c.id===l.clientId);
      if(!client)return;
      const col=COLORS[client.ci%COLORS.length];
      rows+=`<div class="crow">
        <div class="avatar" style="width:26px;height:26px;font-size:10px;background:${col.bg};color:${col.txt};">${ini(client.name)}</div>
        <span class="crow-name">${esc(client.name)}</span>
        <span class="crow-url" title="${esc(l.url)}">${esc(l.url)}</span>
        <button class="icon-btn" onclick="openLinkModal(${l.id},null)" title="Edit" style="transform:scaleX(-1);${clientMode?'display:none;':''}">✎</button>
        <button class="open-btn" onclick="window.open('${esc(l.url)}','_blank')">Open →</button>
      </div>`;
    });
    html+=`<div class="cat-section">
      <div class="cat-head"><span class="cat-title">${esc(cat)}</span><span class="cat-count">${catLinks.length} client${catLinks.length!==1?'s':''}</span></div>
      <div>${rows||'<div class="crow" style="color:var(--text-tertiary);font-size:13px;">No clients</div>'}</div>
    </div>`;
  });
  document.getElementById('main').innerHTML=html;
}

function renderQueue(){
  const allCats=cats();
  let html=`<div class="queue-notice"><strong>How to use:</strong> Click <strong>Open →</strong> to launch the sheet in a new tab. Work on it, close the tab, and click the next client to keep moving down the list.</div>`;
  if(!allCats.length){html+='<div class="empty">No files yet. Add some first.</div>';}
  allCats.forEach(cat=>{
    html+=`<div style="margin-bottom:1.5rem;"><div class="q-section-label">${esc(cat)}</div>`;
    S.links.filter(l=>l.category===cat).forEach((l,i)=>{
      const client=S.clients.find(c=>c.id===l.clientId);
      if(!client)return;
      const col=COLORS[client.ci%COLORS.length];
      html+=`<div class="q-item">
        <div class="q-num">${i+1}</div>
        <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${col.bg};color:${col.txt};">${ini(client.name)}</div>
        <div class="q-info"><div class="q-client">${esc(client.name)}</div><div class="q-cat">${esc(cat)}</div></div>
        <button class="open-btn" onclick="window.open('${esc(l.url)}','_blank')">Open →</button>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('main').innerHTML=html;
}

function renderDetail(app){
  const c=S.clients.find(x=>x.id===detailId);
  if(!c){detailId=null;render();return;}
  const col=COLORS[c.ci%COLORS.length];
  const inf=c.info||{};
  const links=S.links.filter(l=>l.clientId===c.id);
  const linksHtml=links.map(l=>`
    <div class="lt-row">
      <span class="lt-label">${esc(l.label)}</span>
      <span class="lt-cat">${esc(l.category)}</span>
      <span class="lt-url" title="${esc(l.url)}">${esc(l.url)}</span>
      <button class="open-btn" onclick="window.open('${esc(l.url)}','_blank')">Open</button>
      ${clientMode?'':`<button class="icon-btn" onclick="openLinkModal(${l.id},null)" title="Edit" style="transform:scaleX(-1);">✎</button>
      <button class="icon-btn" onclick="deleteLink(${l.id})" title="Delete">×</button>`}
    </div>`).join('')||'<div style="font-size:13px;color:var(--text-tertiary);font-style:italic;padding:.5rem 0;">No files yet.</div>';

  const fields=S.fields||DEFAULT_FIELDS;
  const fieldCards=fields.map(f=>{
    const v=inf[f.key];
    const span=(f.type==='textarea'||f.key==='notes'||f.key==='locations')?'grid-column:1/-1;':'';
    if(f.key==='staff'){
      let staffArr=[];
      try{staffArr=JSON.parse(v||'[]');}catch(e){if(v)staffArr=[{name:v,title:'',phone:''}];}
      const staffHtml=staffArr.length?`
        <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:var(--bg-tertiary);border-bottom:0.5px solid var(--border-light);padding:5px 10px;gap:0;">
            ${['Name','Title / Role','Phone','Email'].map(h=>`<div style="font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;">${h}</div>`).join('')}
          </div>
          ${staffArr.map((m,i)=>`
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:7px 10px;gap:0;border-bottom:${i<staffArr.length-1?'0.5px solid var(--border-light)':'none'};background:var(--bg-primary);">
            <div style="font-size:12px;font-weight:500;padding-right:8px;"><button onclick="openStaffProfile(${c.id},${i})" style="background:none;border:none;font-size:12px;font-weight:500;color:var(--text-primary);cursor:pointer;font-family:var(--font);padding:0;text-align:left;text-decoration:underline;text-decoration-color:var(--border-mid);text-underline-offset:2px;">${esc(m.name)||'—'}</button></div>
            <div style="font-size:12px;color:var(--text-secondary);padding-right:8px;">${esc(m.title)||'—'}</div>
            <div style="font-size:12px;color:var(--text-tertiary);padding-right:8px;">${esc(m.phone)||'—'}</div>
            <div style="font-size:12px;color:var(--text-tertiary);">${esc(m.email)||'—'}</div>
          </div>`).join('')}
        </div>`:'<span class="muted">—</span>';
      return`<div class="detail-card" style="grid-column:1/-1;"><div class="detail-card-title">${esc(f.label)}</div><div class="detail-card-val">${staffHtml}</div></div>`;
    }
    return`<div class="detail-card" style="${span}"><div class="detail-card-title">${esc(f.label)}</div><div class="detail-card-val">${v?esc(v):'<span class="muted">—</span>'}</div></div>`;
  }).join('');

  const subParts=[];
  const nlocF=fields.find(f=>f.key==='numLocations');
  const tzF=fields.find(f=>f.key==='timezone');
  if(nlocF&&inf.numLocations) subParts.push(inf.numLocations+' location'+(inf.numLocations!='1'?'s':''));
  if(tzF&&inf.timezone) subParts.push(inf.timezone);

  app.innerHTML=`
    <button class="back-btn" onclick="detailId=null;render()">← Back to all clients</button>
    <div class="detail-header">
      <div class="avatar" style="width:52px;height:52px;font-size:18px;font-weight:600;background:${col.bg};color:${col.txt};">${ini(c.name)}</div>
      <div style="flex:1;">
        <div class="detail-name">${esc(c.name)}</div>
        <div class="detail-sub">${subParts.join(' · ')||'No profile info yet'}</div>
      </div>
      ${clientMode?'':` <button class="btn-ghost" onclick="openClientModal(${c.id})">Edit profile</button>
      <button class="btn-ghost" style="color:#A32D2D;border-color:rgba(163,45,45,0.3);" onclick="confirmDeleteClient(${c.id})">Delete client</button>`}
    </div>
    <div class="detail-grid">${fieldCards}</div>
    <div class="detail-section-title">
      Spreadsheet links
      ${clientMode?'':` <button class="btn-ghost" style="height:30px;font-size:12px;padding:0 12px;" onclick="openLinkModal(null,${c.id})">+ Add link</button>`}
    </div>
    <div class="links-table">${linksHtml}</div>`;
}

function showModal(inner){
  let overlay=document.getElementById('modal-overlay');
  if(!overlay){overlay=document.createElement('div');overlay.id='modal-overlay';overlay.className='modal-overlay';document.body.appendChild(overlay);}
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">${inner}</div>`;
  overlay.onclick=closeModal;
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove();}

function getStaffArr(c){
  let staffArr=[];
  try{staffArr=JSON.parse(c.info.staff||'[]');}catch(e){if(c.info&&c.info.staff)staffArr=[{name:c.info.staff,title:'',phone:'',email:'',notesLog:[]}];}
  return staffArr;
}

function fmtDate(){
  const now=new Date();
  return now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function openStaffProfile(clientId,staffIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  const m=staffArr[staffIdx];
  if(!m)return;
  const col=COLORS[c.ci%COLORS.length];
  const log=Array.isArray(m.notesLog)?m.notesLog:[];
  const showHistory=!(S.adminSettings&&S.adminSettings.hideEditHistory);

  const logHtml=log.length?[...log].map((entry,i)=>({entry,origIdx:i})).reverse().map(({entry,origIdx})=>{
    const showThisHistory=showHistory&&entry.edited&&!entry.hideHistory;
    const displayDate=showThisHistory&&entry.editedAt
      ?`${esc(entry.originalDate||entry.date)} · edited ${esc(entry.editedAt)}`
      :esc(entry.originalDate||entry.date);
    return`
    <div style="padding:10px 12px;border-bottom:0.5px solid var(--border-light);background:var(--bg-primary);" id="note-row-${origIdx}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;">
        <span style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;flex:1;">
          ${displayDate}${showThisHistory?` <span style="font-style:italic;color:var(--text-tertiary);">(edited)</span>`:''}
        </span>
        ${showThisHistory&&Array.isArray(entry.history)&&entry.history.length?`<button onclick="viewNoteHistory(${origIdx})" style="font-size:10px;padding:1px 6px;border:none;border-radius:3px;background:transparent;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--border-mid);">see changes</button>`:''}
        <button onclick="startEditNote(${clientId},${staffIdx},${origIdx})" style="font-size:11px;padding:2px 8px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);">Edit</button>
        <button onclick="confirmDeleteNote(${clientId},${staffIdx},${origIdx})" style="font-size:11px;padding:2px 8px;border:0.5px solid rgba(163,45,45,0.3);border-radius:4px;background:transparent;color:#A32D2D;cursor:pointer;font-family:var(--font);">Delete</button>
      </div>
      <div id="note-text-${origIdx}" style="font-size:13px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;">${esc(entry.text)}</div>
      <div id="note-history-${origIdx}" style="display:none;margin-top:8px;border-top:0.5px solid var(--border-light);padding-top:8px;">
        ${Array.isArray(entry.history)?entry.history.map((h,hi)=>`
          <div style="margin-bottom:6px;">
            <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:2px;">Version ${hi+1} — ${esc(h.date)}</div>
            <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;padding:6px 8px;background:var(--bg-secondary);border-radius:4px;">${esc(h.text)}</div>
          </div>`).join(''):''}
      </div>
      <div id="note-edit-${origIdx}" style="display:none;">
        <textarea id="note-edit-ta-${origIdx}" style="width:100%;padding:6px 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-family:var(--font);font-size:13px;resize:vertical;min-height:60px;line-height:1.6;margin-top:4px;">${esc(entry.text)}</textarea>
        <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:5px;">
          <button onclick="cancelEditNote(${origIdx})" style="font-size:11px;padding:3px 10px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);">Cancel</button>
          <button onclick="confirmSaveNote(${clientId},${staffIdx},${origIdx})" style="font-size:11px;padding:3px 10px;border:none;border-radius:4px;background:var(--text-primary);color:var(--bg-primary);cursor:pointer;font-family:var(--font);">Save edit</button>
        </div>
      </div>
    </div>`;}).join('')
    :`<div style="font-size:12px;color:var(--text-tertiary);font-style:italic;padding:10px;">No notes yet.</div>`;

  showModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div style="width:44px;height:44px;border-radius:50%;background:${col.bg};color:${col.txt};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;">${ini(m.name||'?')}</div>
      <div style="flex:1;">
        <div style="font-size:16px;font-weight:500;color:var(--text-primary);">${esc(m.name||'—')}</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${esc(c.name)}</div>
      </div>
      <button onclick="promptAdminSettings(${clientId},${staffIdx})" style="background:none;border:none;font-size:11px;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);padding:2px 4px;" title="Admin settings">⚙</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="detail-card"><div class="detail-card-title">Title / Role</div>
        <input id="sp-title" value="${esc(m.title||'')}" placeholder="—" style="width:100%;background:transparent;border:none;font-size:13px;color:var(--text-primary);font-family:var(--font);padding:0;margin-top:2px;"/>
      </div>
      <div class="detail-card"><div class="detail-card-title">Phone</div>
        <input id="sp-phone" value="${esc(m.phone||'')}" placeholder="—" style="width:100%;background:transparent;border:none;font-size:13px;color:var(--text-primary);font-family:var(--font);padding:0;margin-top:2px;"/>
      </div>
      <div class="detail-card" style="grid-column:1/-1;"><div class="detail-card-title">Email</div>
        <input id="sp-email" value="${esc(m.email||'')}" placeholder="—" style="width:100%;background:transparent;border:none;font-size:13px;color:var(--text-primary);font-family:var(--font);padding:0;margin-top:2px;"/>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <div class="detail-card-title" style="margin-bottom:6px;">Add note</div>
      <textarea id="sp-newnote" placeholder="Write a new note..." style="width:100%;padding:8px 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-family:var(--font);font-size:13px;resize:vertical;min-height:70px;line-height:1.6;"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:6px;">
        <button onclick="confirmAddNote(${clientId},${staffIdx})" style="height:30px;padding:0 14px;border:none;border-radius:var(--radius-md);background:var(--text-primary);color:var(--bg-primary);font-size:12px;cursor:pointer;font-family:var(--font);">Add note</button>
      </div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="detail-card-title" style="margin-bottom:6px;">Notes log</div>
      <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;max-height:260px;overflow-y:auto;">
        ${logHtml}
      </div>
    </div>
    <div class="modal-actions">
      <button class="m-cancel" onclick="closeModal()">Close</button>
      <button class="m-save" onclick="confirmSaveStaffProfile(${clientId},${staffIdx})">Save changes</button>
    </div>`);
}

function viewNoteHistory(noteIdx){
  const histDiv=document.getElementById('note-history-'+noteIdx);
  const textDiv=document.getElementById('note-text-'+noteIdx);
  if(!histDiv)return;
  const isOpen=histDiv.style.display!=='none';
  histDiv.style.display=isOpen?'none':'block';
  if(textDiv) textDiv.style.display=isOpen?'block':'none';
}

function promptAdminSettings(clientId,staffIdx){
  showModal(`
    <h3>Admin settings</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">Enter the admin password to access note history settings.</p>
    <div class="fgroup" style="margin-top:10px;">
      <div class="flabel">Password</div>
      <input id="admin-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkAdminPassword(${clientId},${staffIdx})"/>
    </div>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="m-cancel" onclick="openStaffProfile(${clientId},${staffIdx})">Cancel</button>
      <button class="m-save" onclick="checkAdminPassword(${clientId},${staffIdx})">Continue</button>
    </div>`);
  setTimeout(()=>{const el=document.getElementById('admin-pw');if(el)el.focus();},50);
}

function checkAdminPassword(clientId,staffIdx){
  const pw=document.getElementById('admin-pw');
  if(!pw)return;
  if(pw.value.toLowerCase().replace(/\s/g,'')!=='harrypotter'){
    pw.style.border='0.5px solid #A32D2D';
    pw.value='';
    pw.placeholder='Incorrect — try again';
    pw.focus();
    return;
  }
  openAdminSettings(clientId,staffIdx);
}

function openAdminSettings(clientId,staffIdx){
  if(!S.adminSettings) S.adminSettings={hideEditHistory:false};
  const hidden=S.adminSettings.hideEditHistory;
  showModal(`
    <h3>Admin settings</h3>
    <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:14px;">These settings apply across all contact profiles.</p>

function doResetNotesSettings(clientId,staffIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  if(!staffArr[staffIdx])return;
  const log=staffArr[staffIdx].notesLog;
  if(Array.isArray(log)){
    log.forEach(entry=>{entry.hideHistory=false;});
  }
  c.info.staff=JSON.stringify(staffArr);

  openAdminSettings(clientId,staffIdx);

function openNoteHistoryManager(clientId,staffIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  const m=staffArr[staffIdx];
  const log=Array.isArray(m.notesLog)?m.notesLog:[];
  const editedNotes=log.map((e,i)=>({entry:e,idx:i})).filter(({entry})=>entry.edited);

  if(!editedNotes.length){
    showModal(`
      <h3>Manage note history</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:1.6;">No edited notes found for this contact.</p>
      <div class="modal-actions"><button class="m-cancel" onclick="openAdminSettings(${clientId},${staffIdx})">← Back</button></div>`);
    return;
  }

  const rows=editedNotes.map(({entry,idx})=>{
    const suppressed=!!entry.hideHistory;
    const preview=entry.text.length>60?entry.text.slice(0,60)+'…':entry.text;
    return`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:0.5px solid var(--border-light);">
      <div style="flex:1;">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:3px;">${esc(entry.date)}</div>
        <div style="font-size:12px;color:var(--text-primary);line-height:1.5;">${esc(preview)}</div>
        <div style="font-size:11px;margin-top:4px;color:${suppressed?'#A32D2D':'var(--text-tertiary)'};">${suppressed?'History hidden':'History visible'}</div>
      </div>
      <button onclick="toggleNoteHistoryVisibility(${clientId},${staffIdx},${idx})" style="flex-shrink:0;height:28px;padding:0 12px;border:0.5px solid ${suppressed?'rgba(163,45,45,0.3)':'var(--border-mid)'};border-radius:var(--radius-md);background:transparent;color:${suppressed?'#A32D2D':'var(--text-secondary)'};font-size:11px;cursor:pointer;font-family:var(--font);white-space:nowrap;">
        ${suppressed?'Show history':'Hide history'}
      </button>
    </div>`;
  }).join('');

  showModal(`
    <h3>Manage note history</h3>
    <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:10px;">Toggle visibility of "(edited)" and "See changes" per note. History data is always preserved.</p>
    <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;max-height:300px;overflow-y:auto;">
      ${rows}
    </div>
    <div class="modal-actions" style="margin-top:10px;">
      <button class="m-cancel" onclick="openAdminSettings(${clientId},${staffIdx})">← Back</button>
    </div>`);
}

function toggleNoteHistoryVisibility(clientId,staffIdx,noteIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  const note=staffArr[staffIdx].notesLog[noteIdx];
  if(!note)return;
  note.hideHistory=!note.hideHistory;
  c.info.staff=JSON.stringify(staffArr);
  save();
  openNoteHistoryManager(clientId,staffIdx);
}

function toggleAdminSetting(key,clientId,staffIdx){
  if(!S.adminSettings) S.adminSettings={};
  S.adminSettings[key]=!S.adminSettings[key];
  save();
  openAdminSettings(clientId,staffIdx);
}

function doSaveNoteEdit(){
  const{clientId,staffIdx,noteIdx,newText}=window._pendingNoteEdit||{};

  if(!c)return;

      <input id="sp-${i}" value="${esc(m.phone||'')}" placeholder="—" style="height:28px;padding:0 6px;border:0.5px solid transparent;border-radius:4px;background:transparent;color:var(--text-primary);font-size:12px;font-family:var(--font);width:100%;"/>

    </div>`).join('')}

function initStaffDragSort(){
  const editor=document.getElementById('staff-editor');
  if(!editor)return;
  let dragEl=null,dragOver=null;
  editor.querySelectorAll('.staff-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      if(!e.target.classList.contains('staff-handle')){e.preventDefault();return;}
      dragEl=row;
      setTimeout(()=>row.style.opacity='0.4',0);
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      editor.querySelectorAll('.staff-row').forEach(r=>{r.style.opacity='1';r.style.outline='';});
      if(dragEl&&dragOver&&dragEl!==dragOver){
        const staff=readStaffFromDOM();
        const from=parseInt(dragEl.dataset.idx);
        const to=parseInt(dragOver.dataset.idx);
        const moved=staff.splice(from,1)[0];
        staff.splice(to,0,moved);
        document.getElementById('staff-editor').innerHTML=renderStaffEditor(staff);
        rebindStaffIndices();
        initStaffDragSort();
      }
      dragEl=null;dragOver=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(row!==dragEl){
        dragOver=row;
        editor.querySelectorAll('.staff-row').forEach(r=>r.style.outline='');
        row.style.outline='2px solid var(--border-strong)';
      }
    });
  });
}

function readStaffFromDOM(){
  const rows=document.querySelectorAll('.staff-row');
  const result=[];
  rows.forEach((r,i)=>{
    const n=(document.getElementById('sn-'+i)||{}).value||'';
    const t=(document.getElementById('st-'+i)||{}).value||'';
    const p=(document.getElementById('sp-'+i)||{}).value||'';
    const e=(document.getElementById('se-'+i)||{}).value||'';
    if(n.trim()||t.trim()||p.trim()||e.trim()) result.push({name:n.trim(),title:t.trim(),phone:p.trim(),email:e.trim()});
  });
  return result;
}

function addStaffMember(){
  const current=readStaffFromDOM();
  current.push({name:'',title:'',phone:'',email:''});
  document.getElementById('staff-editor').innerHTML=renderStaffEditor(current);
  rebindStaffIndices();
  initStaffDragSort();
}

function removeStaffMember(idx){
  const current=readStaffFromDOM();
  const member=current[idx];
  const name=member&&member.name?member.name:'this team member';
  window._pendingStaffRemove={idx};
  showModal(`
    <h3>Remove team member?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;"><strong>${esc(name)}</strong> will be removed from this client's staff list.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doRemoveStaffMember()">Remove</button>
    </div>`);
}

function doRemoveStaffMember(){
  const{idx}=window._pendingStaffRemove||{};
  window._pendingStaffRemove=null;
  const current=readStaffFromDOM();
  current.splice(idx,1);
  closeModal();
  document.getElementById('staff-editor').innerHTML=renderStaffEditor(current);
  rebindStaffIndices();
  initStaffDragSort();
}

function rebindStaffIndices(){
  document.querySelectorAll('.staff-row').forEach((r,i)=>{
    r.id='sr-'+i;
    r.dataset.idx=i;
    ['sn','st','sp','se'].forEach(p=>{const el=r.querySelector(`[id^="${p}-"]`);if(el)el.id=p+'-'+i;});
    const btn=r.querySelector('.icon-btn');
    if(btn) btn.setAttribute('onclick',`removeStaffMember(${i})`);
  });
}

function openClientModal(id){
  const c=id?S.clients.find(x=>x.id===id):null;
  const inf=(c&&c.info)||{};
  const fields=getClientFields(id);
  const fieldRows=fields.map(f=>{
    if(f.key==='staff'){
      let staffArr=[];
      try{staffArr=JSON.parse(inf.staff||'[]');}catch(e){if(inf.staff)staffArr=[{name:inf.staff,title:'',phone:''}];}
      if(!Array.isArray(staffArr)||!staffArr.length) staffArr=[];
      return`<div class="fgroup">
        <div class="flabel" style="margin-bottom:6px;">${esc(f.label)}</div>
        <div id="staff-editor">${renderStaffEditor(staffArr)}</div>
        <button onclick="addStaffMember()" style="display:flex;align-items:center;gap:5px;padding:5px 9px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);color:var(--text-tertiary);font-size:12px;cursor:pointer;background:none;font-family:var(--font);width:100%;">
          <span style="font-size:14px;">+</span> Add staff member
        </button>
      </div>`;
    }
    const v=esc(inf[f.key]||'');
    if(f.key==='timezone'){
      const tzOpts=['','CT — Central Time','ET — Eastern Time','MT — Mountain Time','PT — Pacific Time','AKT — Alaska Time','HT — Hawaii Time'];
      return`<div class="fgroup"><div class="flabel">${esc(f.label)}</div><select id="mf-${esc(f.key)}">${tzOpts.map(t=>`<option value="${esc(t)}"${(inf[f.key]||'')==t?' selected':''}>${t||'Select time zone...'}</option>`).join('')}</select></div>`;
    }
    if(f.type==='textarea') return`<div class="fgroup"><div class="flabel">${esc(f.label)}</div><textarea id="mf-${esc(f.key)}" placeholder="${esc(f.placeholder||'')}">${v}</textarea></div>`;
    return`<div class="fgroup"><div class="flabel">${esc(f.label)}</div><input id="mf-${esc(f.key)}" value="${v}" placeholder="${esc(f.placeholder||'')}"/></div>`;
  }).join('');
  showModal(`
    <h3>${id?'Edit client':'New client'}</h3>
    <div class="fgroup"><div class="flabel">Client name</div><input id="m-name" value="${esc(c?c.name:'')}" placeholder="Practice name"/></div>
    ${fieldRows}
    <div class="modal-actions">
      ${id?`<button class="m-danger" onclick="confirmDeleteClient(${id})">Delete client</button>`:''}
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveClientModal(${id||'null'})">Save</button>
    </div>
    <div style="margin-top:10px;text-align:left;">
      <button onclick="promptAdvancedFields(${id||'null'})" style="background:none;border:none;font-size:11px;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);padding:0;">Advanced settings</button>
    </div>`);
  setTimeout(initStaffDragSort, 0);
}

function saveClientModal(id){
  const name=val('m-name').trim();
  if(!name){alert('Client name is required.');return;}
  const fields=getClientFields(id);
  const info={};
  fields.forEach(f=>{
    if(f.key==='staff'){
      info.staff=JSON.stringify(readStaffFromDOM());
    } else {
      const el=document.getElementById('mf-'+f.key);
      if(el)info[f.key]=(el.value||'').trim();
    }
  });
  if(id){const c=S.clients.find(x=>x.id===id);c.name=name;c.info=info;}
  else{S.clients.push({id:S.nCid++,name,ci:S.clients.length%COLORS.length,info});}
  save();closeModal();render();
}

function getClientFields(clientId){
  if(!clientId||clientId==='null') return S.fields||DEFAULT_FIELDS;
  const c=S.clients.find(x=>x.id===clientId||x.id===parseInt(clientId));
  return(c&&c.fields)||S.fields||DEFAULT_FIELDS;
}

function promptAdvancedFields(clientId){
  showModal(`
    <h3>Advanced settings</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">You are entering advanced settings. Changes apply to this client only unless you choose otherwise.</p>
    <div class="fgroup" style="margin-top:8px;">
      <div class="flabel">Password</div>
      <input id="adv-pw" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkAdvancedPassword(${clientId})"/>
    </div>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="m-cancel" onclick="openClientModal(${clientId==='null'?'null':clientId})">Cancel</button>
      <button class="m-save" onclick="checkAdvancedPassword(${clientId})">Continue</button>
    </div>`);
  setTimeout(()=>{const el=document.getElementById('adv-pw');if(el)el.focus();},50);
}

function checkAdvancedPassword(clientId){
  const pw=document.getElementById('adv-pw');
  if(!pw)return;
  if(pw.value.toLowerCase().replace(/\s/g,'')!=='harrypotter'){
    pw.style.border='0.5px solid #A32D2D';
    pw.value='';
    pw.placeholder='Incorrect — try again';
    pw.focus();
    return;
  }
  openAdvancedFields(clientId);
}

function openAdvancedFields(clientId){
  const fields=getClientFields(clientId);
  const rows=fields.map((f,i)=>`
    <div class="af-row" draggable="true" data-idx="${i}" style="display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:default;">
      <span class="af-handle" style="cursor:grab;color:var(--text-tertiary);font-size:16px;padding:0 2px;user-select:none;line-height:1;">⠿</span>
      <input value="${esc(f.label)}" placeholder="Field name" style="flex:1;height:32px;padding:0 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);" id="af-label-${i}"/>
      <select style="height:32px;padding:0 6px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:12px;font-family:var(--font);" id="af-type-${i}">
        <option value="text"${f.type==='text'?' selected':''}>Text</option>
        <option value="textarea"${f.type==='textarea'?' selected':''}>Textarea</option>
        <option value="timezone"${f.type==='timezone'?' selected':''}>Timezone</option>
      </select>
      <button class="icon-btn" style="color:#A32D2D;font-size:16px;" onclick="removeAdvancedField(${i},${clientId})">×</button>
    </div>`).join('');
  showModal(`
    <h3>Advanced settings</h3>
    <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px;">Drag ⠿ to reorder. Editing fields for this client only. Use "Apply to all" to push to every client.</p>
    <div id="af-rows">${rows}</div>
    <button onclick="addAdvancedField(${clientId})" style="display:flex;align-items:center;gap:5px;padding:6px 10px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);color:var(--text-tertiary);font-size:12px;cursor:pointer;background:none;font-family:var(--font);margin-bottom:12px;width:100%;"><span style="font-size:15px;">+</span> Add field</button>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button onclick="resetFieldOrder(${clientId})" style="flex:1;height:32px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);">Reset order</button>
      <button onclick="confirmResetFields(${clientId})" style="flex:1;height:32px;padding:0 10px;border:0.5px solid rgba(163,45,45,0.3);border-radius:var(--radius-md);background:transparent;color:#A32D2D;font-size:12px;cursor:pointer;font-family:var(--font);">Reset fields</button>
    </div>
    <div style="border-top:0.5px solid var(--border-light);padding-top:10px;display:flex;gap:6px;">
      <button class="m-cancel" style="flex:1;" onclick="openClientModal(${clientId==='null'?'null':clientId})">← Back</button>
      <button onclick="saveAdvancedFields(${clientId},false)" style="flex:1;height:34px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);">Save for this client</button>
      <button onclick="confirmApplyAll(${clientId})" style="flex:1;height:34px;padding:0 10px;border:none;border-radius:var(--radius-md);background:var(--text-primary);color:var(--bg-primary);font-size:13px;cursor:pointer;font-family:var(--font);">Apply to all</button>
    </div>`);
  initDragSort(clientId);
}

function initDragSort(clientId){
  const container=document.getElementById('af-rows');
  if(!container)return;
  let dragEl=null,dragOver=null;
  container.querySelectorAll('.af-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      dragEl=row;
      setTimeout(()=>row.style.opacity='0.4',0);
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      row.style.opacity='1';
      container.querySelectorAll('.af-row').forEach(r=>r.style.borderTop='');
      if(dragEl&&dragOver&&dragEl!==dragOver){
        const fields=readAdvancedFieldsFromDOM(clientId);
        const fromIdx=parseInt(dragEl.dataset.idx);
        const toIdx=parseInt(dragOver.dataset.idx);
        const moved=fields.splice(fromIdx,1)[0];
        fields.splice(toIdx,0,moved);
        setClientFieldsTemp(clientId,fields);
        openAdvancedFields(clientId);
      }
      dragEl=null;dragOver=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(row!==dragEl){
        dragOver=row;
        container.querySelectorAll('.af-row').forEach(r=>r.style.borderTop='');
        row.style.borderTop='2px solid var(--border-strong)';
      }
    });
  });
}

function confirmApplyAll(clientId){
  showModal(`
    <h3>Apply to all clients?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will overwrite the field structure for every client with these settings. Individual client data is preserved where field keys match.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
      <button class="m-save" onclick="saveAdvancedFields(${clientId},true)">Apply to all</button>
    </div>`);
}

function resetFieldOrder(clientId){
  const current=readAdvancedFieldsFromDOM(clientId);
  const defaultKeys=DEFAULT_FIELDS.map(f=>f.key);
  const defaultFields=DEFAULT_FIELDS.map(dk=>{
    const existing=current.find(f=>f.key===dk.key);
    return existing||dk;
  });
  const extras=current.filter(f=>!defaultKeys.includes(f.key));
  const reordered=[...defaultFields,...extras];
  setClientFieldsTemp(clientId,reordered);
  openAdvancedFields(clientId);
}

function confirmResetFields(clientId){
  showModal(`
    <h3>Reset fields?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will restore the original field names and order for this client. Custom fields will be removed. Saved data is not affected.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
      <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doResetFields(${clientId})">Reset</button>
    </div>`);
}

function doResetFields(clientId){
  setClientFieldsTemp(clientId,JSON.parse(JSON.stringify(DEFAULT_FIELDS)));
  openAdvancedFields(clientId);
}

function setClientFieldsTemp(clientId,fields){
  if(!clientId||clientId==='null'){S.fields=fields;return;}
  const c=S.clients.find(x=>x.id===parseInt(clientId));
  if(c) c.fields=fields;
}

function addAdvancedField(clientId){
  const fields=readAdvancedFieldsFromDOM(clientId);
  fields.push({key:'custom_'+Date.now(),label:'New field',type:'text',placeholder:''});
  setClientFieldsTemp(clientId,fields);
  openAdvancedFields(clientId);
}

function removeAdvancedField(idx,clientId){
  const fields=readAdvancedFieldsFromDOM(clientId);
  const field=fields[idx];
  const label=field&&field.label?field.label:'this field';
  window._pendingFieldRemove={idx,clientId};
  showModal(`
    <h3>Remove field?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;"><strong>${esc(label)}</strong> will be removed. Any data saved in this field for this client will no longer be visible.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
      <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doRemoveAdvancedField()">Remove</button>
    </div>`);
}

function doRemoveAdvancedField(){
  const{idx,clientId}=window._pendingFieldRemove||{};
  window._pendingFieldRemove=null;
  const fields=readAdvancedFieldsFromDOM(clientId);
  fields.splice(idx,1);
  setClientFieldsTemp(clientId,fields);
  openAdvancedFields(clientId);
}

function readAdvancedFieldsFromDOM(clientId){
  const existing=getClientFields(clientId);
  return existing.map((f,i)=>{
    const labelEl=document.getElementById('af-label-'+i);
    const typeEl=document.getElementById('af-type-'+i);
    return{key:f.key,label:labelEl?labelEl.value.trim()||f.label:f.label,type:typeEl?typeEl.value:f.type,placeholder:f.placeholder||''};
  });
}

function saveAdvancedFields(clientId,applyAll){
  const fields=readAdvancedFieldsFromDOM(clientId);
  if(applyAll){
    S.fields=fields;
    S.clients.forEach(c=>{c.fields=JSON.parse(JSON.stringify(fields));});
  } else {
    setClientFieldsTemp(clientId,fields);
  }
  save();
  openClientModal(clientId==='null'?null:parseInt(clientId));
}

function openLinkModal(linkId,prefClientId){
  const l=linkId?S.links.find(x=>x.id===linkId):null;
  const existingCats=[...new Set(S.links.map(x=>x.category))].sort();
  const defClient=l?l.clientId:prefClientId||(S.clients[0]?S.clients[0].id:null);
  const clientOpts=S.clients.map(c=>`<option value="${c.id}"${defClient===c.id?' selected':''}>${esc(c.name)}</option>`).join('');
  const catOpts=existingCats.map(c=>`<option value="${esc(c)}">`).join('');
  showModal(`
    <h3>${l?'Edit link':'Add spreadsheet link'}</h3>
    <div class="fgroup"><div class="flabel">Client</div><select id="m-client">${clientOpts}</select></div>
    <div class="fgroup"><div class="flabel">Category</div>
      <input id="m-cat" list="cat-dl" value="${esc(l?l.category:'')}" placeholder="e.g. Media Plan, Budget, Tracker"/>
      <datalist id="cat-dl">${catOpts}</datalist>
    </div>
    <div class="fgroup"><div class="flabel">Button label (optional — defaults to category name)</div>
      <input id="m-label" value="${esc(l?l.label:'')}" placeholder="Leave blank to use category name"/>
    </div>
    <div class="fgroup"><div class="flabel">Spreadsheet URL</div>
      <input id="m-url" value="${esc(l?l.url:'')}" placeholder="https://docs.google.com/spreadsheets/..."/>
    </div>
    <div class="modal-actions">
      ${l?`<button class="m-danger" onclick="confirmDeleteLink(${l.id})">Delete link</button>`:''}
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveLinkModal(${linkId||'null'})">Save</button>
    </div>`);
}

function saveLinkModal(id){
  const cid=parseInt(val('m-client'));
  const cat=val('m-cat').trim();
  const lbl=val('m-label').trim()||cat;
  const url=val('m-url').trim();
  if(!cat){alert('Category is required.');return;}
  if(id){const l=S.links.find(x=>x.id===id);l.clientId=cid;l.category=cat;l.label=lbl;l.url=url;}
  else{S.links.push({id:S.nLid++,clientId:cid,label:lbl,category:cat,url});}
  save();closeModal();render();
}

function confirmDeleteClient(id){
  const c=S.clients.find(x=>x.id===id);
  showModal(`
    <h3>Delete client?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">"<strong>${esc(c?c.name:'this client')}</strong>" and all their links will be permanently removed.</p>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doDeleteClient(${id})">Delete</button>
    </div>`);
}

function doDeleteClient(id){
  S.clients=S.clients.filter(c=>c.id!==id);
  S.links=S.links.filter(l=>l.clientId!==id);
  if(filter===id)filter='all';
  if(detailId===id)detailId=null;
  save();closeModal();render();
}

function confirmDeleteLink(id){
  const l=S.links.find(x=>x.id===id);
  showModal(`
    <h3>Delete link?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">"<strong>${esc(l?l.label:'this link')}</strong>" will be permanently removed.</p>
    <div class="modal-actions" style="margin-top:8px;">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doDeleteLink(${id})">Delete</button>
    </div>`);
}

function doDeleteLink(id){
  S.links=S.links.filter(l=>l.id!==id);
  save();closeModal();render();
}

function deleteLink(id){confirmDeleteLink(id);}

function addClient(){
  const inp=document.getElementById('nc-inp');
  if(!inp)return;
  const name=inp.value.trim();
  if(!name)return;
  S.clients.push({id:S.nCid++,name,ci:S.clients.length%COLORS.length,info:{}});
  inp.value='';
  save();render();
}

function exportBackup(){
  const now=new Date();
  const stamp=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+'_'+String(now.getHours()).padStart(2,'0')+String(now.getMinutes()).padStart(2,'0');
  const filename=`GMJ_Dashboard_Backup_${stamp}.json`;
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.clients||!Array.isArray(parsed.clients)) throw new Error('Invalid backup file — missing clients.');
      window._pendingImport=parsed;
      showModal(`
        <h3>Restore backup?</h3>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will replace all current data with the contents of <strong>${esc(file.name)}</strong>. This cannot be undone.</p>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:6px;">Backup contains <strong>${parsed.clients.length} clients</strong> and <strong>${(parsed.links||[]).length} links</strong>.</p>
        <div class="modal-actions" style="margin-top:12px;">
          <button class="m-cancel" onclick="closeModal()">Cancel</button>
          <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doImportBackup()">Restore</button>
        </div>`);
    }catch(err){
      showModal(`<h3>Import failed</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">${esc(err.message)}</p><div class="modal-actions"><button class="m-save" onclick="closeModal()">OK</button></div>`);
    }
  };
  reader.readAsText(file);
  input.value='';
}

function doImportBackup(){
  try{
    if(!window._pendingImport) throw new Error('No backup data found.');
    S=window._pendingImport;
    window._pendingImport=null;
    save();closeModal();render();
  }catch(e){
    showModal(`<h3>Restore failed</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">${esc(e.message)}</p><div class="modal-actions"><button class="m-save" onclick="closeModal()">OK</button></div>`);
  }
}

function switchView(v){view=v;filter='all';render();}
function setFilter(f){filter=f;render();}
function openDetail(id){detailId=id;render();}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function debugRecoverData(){
  const keys=Object.keys(localStorage);
  const gmjKeys=keys.filter(k=>k.includes('gmj')||k.includes('dashboard')||k.includes('csd'));
  let found='Keys in localStorage:\n'+keys.join('\n')+'\n\nGMJ-related:\n';
  gmjKeys.forEach(k=>{
    try{
      const v=JSON.parse(localStorage.getItem(k));
      found+=`\n${k}: ${v.clients?v.clients.length+' clients':''} ${v.links?v.links.length+' links':''}`;
      if(v.clients){
        v.clients.forEach(c=>{
          let staffArr=[];
          try{staffArr=JSON.parse((c.info&&c.info.staff)||'[]');}catch(e){}
          const noteCount=staffArr.reduce((acc,s)=>acc+(s.notesLog?s.notesLog.length:0),0);
          found+=`\n  ${c.name}: ${noteCount} notes`;
        });
      }
    }catch(e){found+=`\n${k}: (parse error)`;}
  });
  showModal(`<h3>Data Recovery</h3><pre style="font-size:11px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto;background:var(--bg-secondary);padding:10px;border-radius:var(--radius-md);margin-top:8px;">${found}</pre><div class="modal-actions"><button class="m-cancel" onclick="closeModal()">Close</button><button class="m-save" onclick="tryRestoreFromAllKeys()">Try restore</button></div>`);
}

function tryRestoreFromAllKeys(){
  const keys=Object.keys(localStorage);
  let best=null,bestScore=0;
  keys.forEach(k=>{
    try{
      const v=JSON.parse(localStorage.getItem(k));
      if(v&&Array.isArray(v.clients)){
        let score=v.clients.length;
        v.clients.forEach(c=>{
          let staffArr=[];
          try{staffArr=JSON.parse((c.info&&c.info.staff)||'[]');}catch(e){}
          score+=staffArr.reduce((acc,s)=>acc+(s.notesLog?s.notesLog.length:0),0)*10;
        });
        if(score>bestScore){bestScore=score;best={key:k,data:v};}
      }
    }catch(e){}
  });
  if(best){
    showModal(`<h3>Found candidate</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:1.6;">Key: <strong>${best.key}</strong><br>${best.data.clients.length} clients found. Restore this data?</p><div class="modal-actions"><button class="m-cancel" onclick="closeModal()">Cancel</button><button class="m-save" onclick="doRestoreKey('${best.key}')">Restore</button></div>`);
  } else {
    showModal(`<h3>Nothing found</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">No recoverable data found in localStorage.</p><div class="modal-actions"><button class="m-save" onclick="closeModal()">OK</button></div>`);
  }
}

function doRestoreKey(key){
  try{
    S=JSON.parse(localStorage.getItem(key));
    save();closeModal();render();
  }catch(e){
    showModal(`<h3>Restore failed</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">${e.message}</p><div class="modal-actions"><button class="m-save" onclick="closeModal()">OK</button></div>`);
  }
}
render();
loadFromSupabase();
</script>
</body>
</html>
