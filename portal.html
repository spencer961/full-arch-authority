          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
            {activeClients.map(c=>{
              const snaps=[...c.snapshots].sort((a,b)=>new Date(a.date)-new Date(b.date));
              const lat=snaps[snaps.length-1];
              const fst=snaps[0];
              const latH=lat?health(lat.scores):0;
              const fstH=fst?health(fst.scores):0;
              const gain=latH-fstH;
              return(<div key={c.id} className="client-card" style={{...CARD,cursor:"pointer",transition:"all 0.2s"}} onClick={()=>{setSelClient(c.id);setSubview("client-map");}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12}}>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:TEXT}}>{c.answers.practiceName}</div>
                    <div style={{fontSize:12,color:MUTED,marginTop:2}}>{c.answers.doctorName}</div>
                  </div>
                  <HealthBadge h={latH}/>
                </div>
                {lat&&(<div>
                  <div style={{display:"flex",height:5,borderRadius:3,overflow:"hidden",gap:1,marginBottom:10}}>
                    {CATS.map(cat=>{const g=cat.items.filter(i=>pScore(lat.scores,i)==="green").length;const y=cat.items.filter(i=>pScore(lat.scores,i)==="yellow").length;const r=cat.items.filter(i=>pScore(lat.scores,i)==="red").length;const t=cat.items.length;return(<React.Fragment key={cat.id}>{g>0&&<div style={{flex:g/t,background:"#22c55e",minWidth:2}}/>}{y>0&&<div style={{flex:y/t,background:"#f59e0b",minWidth:2}}/>}{r>0&&<div style={{flex:r/t,background:"#ef4444",minWidth:2}}/>}</React.Fragment>);})}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:MUTED}}>
                    <span>{snaps.length} month{snaps.length!==1?"s":""} tracked</span>
                    {snaps.length>1&&<span style={{color:gain>0?"#22c55e":"#ef4444",fontWeight:600}}>{gain>0?"+":""}{gain}% since start</span>}
                  </div>
                </div>)}
                <div style={{display:"flex",gap:6,marginTop:14,paddingTop:12,borderTop:"1px solid #dde0ea"}}>
                  <button onClick={e=>{e.stopPropagation();setSelClient(c.id);setSubview("form-review");}} style={{...BTNS,flex:1,padding:"6px",fontSize:11,textAlign:"center"}}>View Form</button>
                  <button onClick={e=>{e.stopPropagation();setSelClient(c.id);setSubview("client-map");}} style={{...BTNS,flex:1,padding:"6px",fontSize:11,textAlign:"center"}}>Success Map</button>
                  <button onClick={e=>{e.stopPropagation();startAssessment(c.id,lat?{...lat.scores}:undefined);}} style={{...BTNP,flex:1,padding:"6px",fontSize:11,textAlign:"center"}}>New Month +</button>
                </div>
              </div>);
            })}
            {activeClients.length===0&&(
              <div style={{...CARD,textAlign:"center",padding:"40px 24px",gridColumn:"1/-1"}}>
                
                <div style={{fontSize:14,color:MUTED}}>No active clients yet. Review pending onboarding forms above to get started.</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── FORM REVIEW ────────────────────────────────────────────────────
  if(view==="consultant"&&subview==="form-review"&&client){
    const hasAnswers=Object.keys(client.answers).filter(k=>!["practiceName","doctorName","officeManager","phone","email"].includes(k)&&client.answers[k]).length>0;
    const updE=(id,v)=>setEditAnswers(a=>({...a,[id]:v}));
    const toggleCbE=(fid,opt)=>{const cur=editAnswers[fid]||[];updE(fid,cur.includes(opt)?cur.filter(o=>o!==opt):[...cur,opt]);};
    const sec=formSecs[editStep];

    if(editingForm){
      return(
        <div style={{background:BG,minHeight:"100vh"}}>
          <Hdr sub="Onboarding Form" practiceName={client.answers.practiceName} right={<div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setEditingForm(false)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>← Cancel</button>
            <button onClick={saveFormAnswers} style={{...BTNP,background:GOLD,color:NAVY}}>Save Form Answers ✓</button>
          </div>}/>
          <div style={{height:4,background:"rgba(255,255,255,0.1)"}}><div style={{height:"100%",width:((editStep+1)/formSecs.length*100)+"%",background:GOLD,transition:"width 0.4s"}}/></div>
          <div style={{maxWidth:640,margin:"0 auto",padding:"36px 20px 80px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:28}}>
              <div style={{display:"flex",gap:4}}>{formSecs.map((_,i)=>(<div key={i} style={{width:i===editStep?16:5,height:5,borderRadius:3,background:i<editStep?"#22c55e":i===editStep?NAVY:"#d0d4e0",transition:"all 0.3s"}}/>))}</div>
              <span style={{fontSize:12,color:MUTED}}>Step {editStep+1} of {formSecs.length}</span>
              <span style={{fontSize:11,color:MUTED,marginLeft:"auto"}}>Editing on behalf of client</span>
            </div>
            <div style={{...CARD,padding:"32px 36px"}}>
              <h1 style={{fontSize:20,fontWeight:600,color:TEXT,marginBottom:6}}>{sec.title}</h1>
              <p style={{fontSize:13,color:MUTED,marginBottom:28}}>{sec.sub}</p>
              <div style={{display:"flex",flexDirection:"column",gap:20}}>
                {sec.fields.map(f=>(<div key={f.id}>
                  <label style={{display:"block",fontSize:13,fontWeight:500,color:TEXT,marginBottom:8}}>{f.label}{f.required&&<span style={{color:GOLD}}> *</span>}</label>
                  {f.type==="checkbox"?(
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {(f.options||[]).map(opt=>{const chk=(editAnswers[f.id]||[]).includes(opt);return(<label key={opt} onClick={()=>toggleCbE(f.id,opt)} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"9px 12px",borderRadius:8,border:"0.5px solid "+(chk?NAVY:BORDER),background:chk?"rgba(11,29,94,0.04)":"#fff",transition:"all 0.15s"}}>
                        <div style={{width:16,height:16,borderRadius:4,border:"1.5px solid "+(chk?NAVY:"#c0c6d8"),background:chk?NAVY:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{chk&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}</div>
                        <span style={{fontSize:13,color:chk?NAVY:TEXT}}>{opt}</span>
                      </label>);})}
                    </div>
                  ):f.type==="textarea"?(
                    <textarea value={editAnswers[f.id]||""} onChange={e=>updE(f.id,e.target.value)} placeholder={f.placeholder} rows={4} style={{...INP,resize:"vertical",lineHeight:1.6}}/>
                  ):(
                    <input type="text" value={editAnswers[f.id]||""} onChange={e=>updE(f.id,e.target.value)} placeholder={f.placeholder} style={INP}/>
                  )}
                </div>))}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:32,paddingTop:24,borderTop:"1px solid #dde0ea"}}>
                <button onClick={()=>editStep>0&&setEditStep(s=>s-1)} style={{...BTNS,opacity:editStep===0?0.4:1,cursor:editStep===0?"not-allowed":"pointer"}}>← Back</button>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={saveFormAnswers} style={{...BTNS,padding:"9px 18px",borderColor:GOLD,color:GOLD}}>Save &amp; Exit</button>
                  {editStep<formSecs.length-1?(
                    <button onClick={()=>setEditStep(s=>s+1)} style={BTNP}>Next →</button>
                  ):(
                    <button onClick={saveFormAnswers} style={{...BTNP,background:GOLD,color:NAVY}}>Save Form ✓</button>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    return(
      <div style={{background:BG,minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <GearModal/>
        <Hdr sub="Form Review" practiceName={client.answers.practiceName} right={<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setSubview("dashboard")} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>← Dashboard</button>
          <button onClick={()=>startEditForm(client)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>
            {hasAnswers?"Edit Form":"Fill Onboarding Form"}
          </button>
          <button onClick={()=>startAssessment(selClient,client.snapshots.length>0?{...client.snapshots[client.snapshots.length-1].scores}:undefined)} style={{...BTNP,background:GOLD,color:NAVY}}>
            {client.snapshots.length===0?"Start Initial Assessment →":"New Monthly Assessment →"}
          </button>
        </div>}/>
        <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 56px)"}}>
          {/* Form answers */}
          <div style={{flex:1,overflowY:"auto",padding:"24px"}}>
            <div style={{maxWidth:680}}>
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>
                  {client.status==="pending"?"Pending Review":"Onboarding Form"}
                </div>
                <div style={{fontSize:20,fontWeight:700,color:TEXT}}>{client.answers.practiceName||"Unknown Practice"}</div>
                <div style={{fontSize:13,color:MUTED,marginTop:2}}>Submitted {new Date(client.submittedAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div>
              </div>

              {/* Quick analysis card */}
              <div style={{...CARD,marginBottom:20,borderLeft:"3px solid "+GOLD,background:"rgba(232,160,32,0.02)"}}>
                <div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Quick Analysis</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    ["Practice",client.answers.practiceName||"—"],
                    ["Doctor",client.answers.doctorName||"—"],
                    ["Goal",client.answers.monthlyGoal||"Not specified"],
                    ["Booking Rate",client.answers.bookingRate||"Unknown"],
                    ["Show Rate",client.answers.showRate||"Unknown"],
                    ["Close Rate",client.answers.closeRate||"Unknown"],
                  ].map(([k,v])=>(<div key={k} style={{padding:"8px 12px",borderRadius:8,background:"#f8f9fc",border:"1px solid #ecedf2"}}>
                    <div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:2}}>{k}</div>
                    <div style={{fontSize:13,fontWeight:600,color:TEXT}}>{v}</div>
                  </div>))}
                </div>
              </div>

              {formSecs.map(sec=>(<div key={sec.id} style={{...CARD,marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:NAVY,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>{sec.title}</div>
                {sec.fields.map((f,fi)=>{const val=client.answers[f.id];return(
                  <div key={f.id} style={{marginBottom:fi<sec.fields.length-1?14:0,paddingBottom:fi<sec.fields.length-1?14:0,borderBottom:fi<sec.fields.length-1?"1px solid #dde0ea":"none"}}>
                    <div style={{fontSize:11,color:MUTED,marginBottom:5}}>{f.label}</div>
                    {!val||(Array.isArray(val)&&val.length===0)?(<div style={{fontSize:12,color:"#d0d4e0",fontStyle:"italic"}}>Not answered</div>):Array.isArray(val)?(<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{val.map(v=><span key={v} style={{padding:"3px 9px",borderRadius:20,background:"rgba(26,37,88,0.07)",border:"1px solid rgba(26,37,88,0.12)",fontSize:12,color:NAVY,fontWeight:500}}>{v}</span>)}</div>):(<div style={{fontSize:13,color:TEXT,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{val}</div>)}
                  </div>
                );})}
              </div>))}
              <div style={{height:40}}/>
            </div>
          </div>
          {/* Read-only scoring view if they have snapshots */}
          {client.snapshots.length>0&&<ScoringPanel scores={client.snapshots[client.snapshots.length-1].scores} onCycle={null}/>}
        </div>
      </div>
    );
  }

  // ── ASSESSMENT VIEW ────────────────────────────────────────────────
  if(view==="consultant"&&subview==="assessment"&&client){
    const ALL=leafIds(CATS);
    const gc=ALL.filter(id=>(assScores[id]||"red")==="green").length;
    const yc=ALL.filter(id=>(assScores[id]||"red")==="yellow").length;
    const rc=ALL.filter(id=>(assScores[id]||"red")==="red").length;
    const hp=Math.round((gc/ALL.length)*100);
    const isInitial=client.snapshots.length===0;
    return(
      <div style={{background:BG,display:"flex",flexDirection:"column",height:"100vh"}}>
        <GearModal/>
        <Hdr sub={(isInitial?"Initial":"Monthly")+" Assessment"} practiceName={client.answers.practiceName} right={<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setSubview(isInitial?"form-review":"client-map")} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>← Cancel</button>
          <button onClick={publishSnapshot} disabled={!assLabel.trim()} style={{...BTNP,background:GOLD,color:NAVY,opacity:assLabel.trim()?1:0.5}}>Publish Assessment →</button>
        </div>}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 320px",flex:1,overflow:"hidden"}}>
          <div style={{overflowY:"auto",padding:"20px"}}>
            <div style={{...CARD,marginBottom:16,borderLeft:"3px solid "+GOLD}}>
              <div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Assessment Details</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <div>
                  <label style={{display:"block",fontSize:12,fontWeight:600,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Month Label</label>
                  <input value={assLabel} onChange={e=>setAssLabel(e.target.value)} placeholder="e.g. Jun 2025" style={INP}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:16,paddingTop:24}}>
                  <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:700,color:"#22c55e",lineHeight:1}}>{gc}</div><div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em"}}>Strong</div></div>
                  <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:700,color:"#f59e0b",lineHeight:1}}>{yc}</div><div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em"}}>In Progress</div></div>
                  <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:700,color:"#ef4444",lineHeight:1}}>{rc}</div><div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em"}}>Needs Work</div></div>
                  <div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:700,color:NAVY,lineHeight:1}}>{hp}%</div><div style={{fontSize:10,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em"}}>Health</div></div>
                </div>
              </div>
            </div>
            <div style={CARD}>
              <div style={{fontSize:11,fontWeight:700,color:NAVY,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Consultant Notes</div>
              <p style={{fontSize:12,color:MUTED,marginBottom:10}}>These notes will be visible to the client after publishing.</p>
              <textarea value={assNotes} onChange={e=>setAssNotes(e.target.value)} placeholder="Add your assessment, priorities, and action plan for this month..." rows={8} style={{...INP,resize:"vertical",lineHeight:1.6}}/>
            </div>
            {/* Form answers quick reference */}
            {isInitial&&(<div style={{...CARD,marginTop:16}}>
              <div style={{fontSize:11,fontWeight:700,color:NAVY,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Onboarding Form — Quick Reference</div>
              {[["Services",(client.answers.services||[]).join(", ")||"—"],["Monthly Goal",client.answers.monthlyGoal||"—"],["Booking Rate",client.answers.bookingRate||"—"],["Show Rate",client.answers.showRate||"—"],["Close Rate",client.answers.closeRate||"—"],["Main Issues",client.answers.mainIssues||"—"]].map(([k,v])=>(<div key={k} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid #dde0ea"}}>
                <div style={{fontSize:11,color:MUTED,marginBottom:3}}>{k}</div>
                <div style={{fontSize:13,color:TEXT,lineHeight:1.5,whiteSpace:"pre-wrap"}}>{v}</div>
              </div>))}
            </div>)}
            <div style={{height:40}}/>
          </div>
          <ScoringPanel scores={assScores} onCycle={cycleScore}/>
        </div>
      </div>
    );
  }

  // ── CLIENT SUCCESS MAP ─────────────────────────────────────────────
  if(view==="consultant"&&subview==="client-map"&&client){
    const lat=allSnaps.length>0?allSnaps[allSnaps.length-1]:null;
    const fst=allSnaps.length>0?allSnaps[0]:null;
    const latH=lat?health(lat.scores):0;
    const fstH=fst?health(fst.scores):0;
    const gain=latH-fstH;

    if(selM){
      const det=allSnaps.find(s=>s.id===selM);
      if(det){
        const ds=det.scores;
        const DL=leafIds(CATS);
        const dg=DL.filter(id=>(ds[id]||"red")==="green").length;
        const dy=DL.filter(id=>(ds[id]||"red")==="yellow").length;
        const dr=DL.filter(id=>(ds[id]||"red")==="red").length;
        const dh=health(ds);
        const si=allSnaps.findIndex(s=>s.id===selM);
        const prev=si>0?allSnaps[si-1]:null;
        const delta=prev?dh-health(prev.scores):null;
        const dRed=CATS.flatMap(c=>c.items.filter(i=>pScore(ds,i)==="red").map(i=>({...i,cat:c.name})));
        return(
          <div style={{background:BG,minHeight:"100vh"}}>
            <Hdr sub={det.label} practiceName={client.answers.practiceName} right={<div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={()=>setSelM(null)} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>← All Months</button>
              <button onClick={()=>startAssessment(selClient,lat?{...lat.scores}:undefined)} style={{...BTNP,background:GOLD,color:NAVY,fontSize:12,padding:"7px 14px"}}>+ New Month</button>
            </div>}/>
            <div style={{maxWidth:1060,margin:"0 auto",padding:"24px 20px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
                <div><div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{det.label} — Monthly Report</div><div style={{fontSize:20,fontWeight:700,color:TEXT}}>{client.answers.practiceName}</div></div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{allSnaps.map(s=>(<button key={s.id} onClick={()=>setSelM(s.id)} style={{padding:"6px 12px",borderRadius:7,border:"1px solid "+(s.id===selM?NAVY:BORDER),background:s.id===selM?NAVY:"#fff",color:s.id===selM?"#fff":TEXT,fontSize:12,cursor:"pointer",fontWeight:s.id===selM?600:400,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>{s.label}</button>))}</div>
              </div>
              {det.notes&&(<div style={{...CARD,marginBottom:16,borderLeft:"3px solid "+GOLD}}><div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>Consultant Notes</div><div style={{fontSize:13,color:MUTED,lineHeight:1.75,whiteSpace:"pre-wrap"}}>{det.notes}</div></div>)}
              <div style={{display:"grid",gridTemplateColumns:"160px 1fr 1fr 1fr",gap:12,marginBottom:16}}>
                <div style={{...CARD,textAlign:"center",borderTop:"3px solid "+NAVY}}>
                  <div style={{fontSize:11,fontWeight:600,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>Health</div>
                  <div style={{fontSize:38,fontWeight:700,color:NAVY,lineHeight:1}}>{dh}<span style={{fontSize:16}}>%</span></div>
                  {delta!==null&&<div style={{fontSize:11,marginTop:5,color:delta>=0?"#22c55e":"#ef4444",fontWeight:600,background:delta>=0?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",borderRadius:20,padding:"2px 8px",display:"inline-block"}}>{delta>=0?"↑":"↓"}{Math.abs(delta)}% vs {prev.label}</div>}
                </div>
                {[{l:"Strong",n:dg,c:"#22c55e"},{l:"In Progress",n:dy,c:"#f59e0b"},{l:"Needs Work",n:dr,c:"#ef4444"}].map(({l,n,c})=>(<div key={l} style={{...CARD,borderTop:"3px solid "+c}}><div style={{fontSize:11,fontWeight:600,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{l}</div><div style={{display:"flex",alignItems:"baseline",gap:5}}><span style={{fontSize:34,fontWeight:700,color:c,lineHeight:1}}>{n}</span><span style={{fontSize:12,color:"#c0c6d8"}}>/ {DL.length}</span></div><div style={{marginTop:8,height:3,background:BORDER,borderRadius:2}}><div style={{height:"100%",width:(n/DL.length*100)+"%",background:c,borderRadius:2}}/></div></div>))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12,marginBottom:16}}>
                {CATS.map(cat=>{const g=cat.items.filter(i=>pScore(ds,i)==="green").length;const y=cat.items.filter(i=>pScore(ds,i)==="yellow").length;const r=cat.items.filter(i=>pScore(ds,i)==="red").length;const pt=Math.round((g/cat.items.length)*100);const io=exp[cat.id];return(<div key={cat.id} style={CARD}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",userSelect:"none",marginBottom:10}} onClick={()=>setExp(e=>({...e,[cat.id]:!e[cat.id]}))}>
                    <div style={{fontSize:12,fontWeight:700,color:TEXT,textTransform:"uppercase",letterSpacing:"0.06em"}}>{cat.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18,fontWeight:700,color:pt>=70?"#22c55e":pt>=40?"#f59e0b":"#ef4444"}}>{pt}%</span><span style={{color:"#c0c6d8",fontSize:10}}>{io?"▲":"▼"}</span></div>
                  </div>
                  <div style={{display:"flex",height:5,borderRadius:3,overflow:"hidden",gap:1,marginBottom:8}}>{g>0&&<div style={{flex:g,background:"#22c55e",minWidth:3}}/>}{y>0&&<div style={{flex:y,background:"#f59e0b",minWidth:3}}/>}{r>0&&<div style={{flex:r,background:"#ef4444",minWidth:3}}/>}</div>
                  <div style={{display:"flex",gap:14}}><span style={{fontSize:11,color:"#22c55e",fontWeight:500}}>● {g}</span><span style={{fontSize:11,color:"#f59e0b",fontWeight:500}}>● {y}</span><span style={{fontSize:11,color:"#ef4444",fontWeight:500}}>● {r}</span></div>
                  {io&&(<div style={{marginTop:12,borderTop:"1px solid #dde0ea",paddingTop:8}}>{cat.items.map(item=>{const s=pScore(ds,item);return(<div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 4px",borderBottom:"1px solid #dde0ea",borderRadius:4}}><span style={{fontSize:13,color:TEXT}}>{item.name}</span><div style={{width:22,height:22,borderRadius:"50%",background:SC[s],display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>{s==="green"?"✓":s==="yellow"?"~":"!"}</div></div>);})}</div>)}
                </div>);})}
              </div>
              {dRed.length>0&&(<div style={{...CARD,border:"1px solid #fca5a5",marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:"#ef4444",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16}}>● Priority Focus — {dRed.length} areas need attention</div>
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  {CATS.map(cat=>{const cr=cat.items.filter(i=>pScore(ds,i)==="red");if(!cr.length)return null;return(<div key={cat.id}><div style={{fontSize:10,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:8}}>{cat.name} <span style={{color:"#ef4444"}}>({cr.length})</span></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6}}>{cr.map(item=>(<div key={item.id} style={{padding:"9px 12px",borderRadius:8,background:"#fff5f5",border:"1px solid #fecaca"}}><div style={{fontSize:13,fontWeight:600,color:TEXT}}>{item.name}</div></div>))}</div></div>);})}
                </div>
              </div>)}
            </div>
          </div>
        );
      }
    }

    // Client map overview (table + timeline)
    const TableView=()=>(
      <div style={{...CARD,padding:0,overflow:"hidden"}}>
        {is1yr&&(<div style={{padding:"8px 16px",background:"#f0f2f8",borderBottom:"0.5px solid #dde0ea",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:11,color:NAVY,fontWeight:600}}><span>←</span><span>Scroll left to see earlier months</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:MUTED}}>
            <span style={{padding:"2px 8px",borderRadius:20,background:"rgba(26,37,88,0.08)",fontSize:10,fontWeight:600,color:NAVY}}>{allSnaps[0]?.label}</span>
            <span>→</span>
            <span style={{padding:"2px 8px",borderRadius:20,background:NAVY,fontSize:10,fontWeight:600,color:"#fff"}}>{allSnaps[allSnaps.length-1]?.label} (now)</span>
          </div>
        </div>)}
        <div ref={is1yr?scrollRef:null} style={{overflowX:"auto"}}>
          <table style={{borderCollapse:"collapse",fontSize:13,width:"100%",tableLayout:"fixed"}}>
            <colgroup><col style={{width:"200px",minWidth:"200px"}}/>{vis.map(s=><col key={s.id} style={{width:"110px",minWidth:"110px"}}/>)}</colgroup>
            <thead>
              <tr>
                <th style={{background:NAVY,color:"#fff",padding:"10px 16px",textAlign:"left",fontWeight:600,fontSize:12,position:"sticky",left:0,zIndex:3,boxShadow:"2px 0 6px rgba(0,0,0,0.12)"}}>Area</th>
                {vis.map(snap=>{const h=health(snap.scores);const idx=allSnaps.findIndex(s=>s.id===snap.id);const prev=idx>0?health(allSnaps[idx-1].scores):null;const d=prev!==null?h-prev:null;const isLat=snap.id===allSnaps[allSnaps.length-1]?.id;return(<th key={snap.id} onClick={()=>setSelM(snap.id)} style={{background:isLat?"#0f1a40":NAVY,color:"#fff",padding:"10px 8px",textAlign:"center",fontWeight:600,fontSize:12,cursor:"pointer",borderLeft:"1px solid rgba(255,255,255,0.1)"}} onMouseEnter={e=>e.currentTarget.style.background="#253070"} onMouseLeave={e=>e.currentTarget.style.background=isLat?"#0f1a40":NAVY}>
                  <div>{snap.label}{isLat&&<span style={{marginLeft:4,fontSize:9,background:"rgba(255,255,255,0.18)",padding:"1px 5px",borderRadius:3}}>NOW</span>}</div>
                  {d!==null&&<div style={{fontSize:10,fontWeight:700,color:d>0?"#86efac":d<0?"#fca5a5":"rgba(255,255,255,0.4)",marginTop:2}}>{d>0?"+":""}{d}%</div>}
                </th>);})}
              </tr>
            </thead>
            <tbody>
              {CATS.map((cat,ci)=>(<React.Fragment key={cat.id}>
                <tr><td style={{background:"#f4f5f9",padding:"6px 16px",fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",borderTop:ci>0?"2px solid #dde0ea":"none",position:"sticky",left:0,zIndex:2,boxShadow:"2px 0 6px rgba(0,0,0,0.06)"}}>{cat.name}</td>{vis.map(s=><td key={s.id} style={{background:"#f4f5f9",borderTop:ci>0?"2px solid #dde0ea":"none",borderLeft:"0.5px solid #ecedf2"}}/>)}</tr>
                {cat.items.map((item,ii)=>(<tr key={item.id} style={{background:ii%2===0?"#fff":"#fafafa"}}>
                  <td style={{padding:"8px 16px 8px 24px",color:MUTED,fontSize:12,borderBottom:"0.5px solid #ecedf2",position:"sticky",left:0,zIndex:2,background:ii%2===0?"#fff":"#fafafa",boxShadow:"2px 0 6px rgba(0,0,0,0.06)"}}>{item.name}</td>
                  {vis.map(snap=>{const s=pScore(snap.scores,item);return(<td key={snap.id} onClick={()=>setSelM(snap.id)} style={{textAlign:"center",padding:"8px",borderBottom:"0.5px solid #ecedf2",borderLeft:"0.5px solid #ecedf2",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#f0f1f8"} onMouseLeave={e=>e.currentTarget.style.background=ii%2===0?"#fff":"#fafafa"}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:SC[s],display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>{s==="green"?"✓":s==="yellow"?"~":"!"}</div>
                  </td>);})}
                </tr>))}
              </React.Fragment>))}
              <tr style={{background:"#f4f5f9",borderTop:"2px solid #dde0ea"}}>
                <td style={{padding:"10px 16px",fontSize:12,fontWeight:700,color:TEXT,position:"sticky",left:0,zIndex:2,background:"#f4f5f9",boxShadow:"2px 0 6px rgba(0,0,0,0.06)"}}>Overall Health</td>
                {vis.map(snap=>{const h=health(snap.scores);return(<td key={snap.id} onClick={()=>setSelM(snap.id)} style={{textAlign:"center",padding:"10px 8px",borderLeft:"0.5px solid #dde0ea",cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#ecedf2"} onMouseLeave={e=>e.currentTarget.style.background="#f4f5f9"}>
                  <span style={{fontSize:17,fontWeight:700,color:h>=70?"#22c55e":h>=40?"#f59e0b":"#ef4444"}}>{h}%</span>
                </td>);})}
              </tr>
            </tbody>
          </table>
        </div>
        <div style={{padding:"10px 16px",display:"flex",gap:16,alignItems:"center",borderTop:"0.5px solid #dde0ea"}}>
          <span style={{fontSize:11,color:MUTED}}>Legend:</span>
          {[["#22c55e","✓","Strong"],["#f59e0b","~","In Progress"],["#ef4444","!","Needs Work"]].map(([c,s,l])=>(<span key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:c}}><span style={{width:16,height:16,borderRadius:"50%",background:c,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#fff",fontWeight:700}}>{s}</span>{l}</span>))}
          <span style={{fontSize:11,color:MUTED,marginLeft:"auto"}}>Click any column to open full report</span>
        </div>
      </div>
    );

    const TimelineView=()=>{
      const n=vis.length;const padL=40,padR=20,padT=30,padB=32,H=180;
      const W=is1yr?Math.max(600,n*110+padL+padR):600;
      const heights=vis.map(s=>health(s.scores));
      const xPos=(i)=>padL+(i/(Math.max(n-1,1)))*(W-padL-padR);
      const yPos=(h)=>padT+(H-padT-padB)*(1-h/100);
      const pts=heights.map((h,i)=>({x:xPos(i),y:yPos(h),h}));
      const polyline=pts.map(p=>p.x+","+p.y).join(" ");
      const area="M"+pts[0].x+","+yPos(0)+" "+pts.map(p=>"L"+p.x+","+p.y).join(" ")+" L"+pts[pts.length-1].x+","+yPos(0)+" Z";
      return(<React.Fragment>
        <div style={{...CARD,marginBottom:12,padding:"20px 24px"}}>
          <div style={{fontSize:12,fontWeight:600,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:16}}>Health Score Over Time</div>
          <div ref={is1yr?scrollRef:null} style={{overflowX:is1yr?"auto":"visible"}}>
            <svg viewBox={"0 0 "+W+" "+H} style={{width:is1yr?W+"px":"100%",minWidth:"100%",display:"block",overflow:"visible"}}>
              {[25,50,75,100].map(g=>(<React.Fragment key={g}><line x1={padL} y1={yPos(g)} x2={W-padR} y2={yPos(g)} stroke="#ecedf2" strokeWidth="1"/><text x={padL-6} y={yPos(g)+4} textAnchor="end" fill="#c0c6d8" fontSize="10">{g}%</text></React.Fragment>))}
              <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1a2558" stopOpacity="0.08"/><stop offset="100%" stopColor="#1a2558" stopOpacity="0"/></linearGradient></defs>
              <path d={area} fill="url(#lg)"/>
              <polyline points={polyline} fill="none" stroke="#1a2558" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
              {pts.map((p,i)=>{const col=p.h>=70?"#22c55e":p.h>=40?"#f59e0b":"#ef4444";const idx=allSnaps.findIndex(s=>s.id===vis[i].id);const prev=idx>0?health(allSnaps[idx-1].scores):null;const d=prev!==null?p.h-prev:null;return(<g key={i} style={{cursor:"pointer"}} onClick={()=>setSelM(vis[i].id)}>
                <circle cx={p.x} cy={p.y} r="14" fill="transparent"/>
                <circle cx={p.x} cy={p.y} r="5" fill={col} stroke="#fff" strokeWidth="2"/>
                <text x={p.x} y={p.y-12} textAnchor="middle" fill={col} fontSize="11" fontWeight="700">{p.h}%</text>
                {d!==null&&<text x={p.x} y={p.y-24} textAnchor="middle" fill={d>0?"#22c55e":d<0?"#ef4444":"#c0c6d8"} fontSize="10" fontWeight="600">{d>0?"+":""}{d}%</text>}
                <text x={p.x} y={H-4} textAnchor="middle" fill={MUTED} fontSize="11">{vis[i].label}</text>
              </g>);})}
            </svg>
          </div>
        </div>
        <div style={{...CARD,padding:"20px 24px"}}>
          <div style={{fontSize:12,fontWeight:600,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>By pillar — {lat?lat.label:"latest"}</div>
          {lat&&CATS.map(cat=>{const g=cat.items.filter(i=>pScore(lat.scores,i)==="green").length;const pt=Math.round((g/cat.items.length)*100);const fg=fst?cat.items.filter(i=>pScore(fst.scores,i)==="green").length:0;const fpt=fst?Math.round((fg/cat.items.length)*100):0;return(<div key={cat.id} style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <span style={{fontSize:12,color:MUTED,width:170,flexShrink:0}}>{cat.name}</span>
            <div style={{flex:1,height:8,background:"#ecedf2",borderRadius:4,overflow:"hidden",position:"relative"}}>
              {fst&&<div style={{position:"absolute",top:0,left:0,height:"100%",width:fpt+"%",background:"#dde0ea",borderRadius:4}}/>}
              <div style={{position:"absolute",top:0,left:0,height:"100%",width:pt+"%",background:pt>=70?"#22c55e":pt>=40?"#f59e0b":"#ef4444",borderRadius:4}}/>
            </div>
            <span style={{fontSize:12,fontWeight:700,color:pt>=70?"#22c55e":pt>=40?"#f59e0b":"#ef4444",width:36,textAlign:"right"}}>{pt}%</span>
            {fst&&pt!==fpt&&<span style={{fontSize:11,color:pt>fpt?"#22c55e":"#ef4444",fontWeight:600,width:36}}>{pt>fpt?"+":""}{pt-fpt}%</span>}
          </div>);})}
        </div>
      </React.Fragment>);
    };

    return(
      <div style={{background:BG,minHeight:"100vh"}}>
        <GearModal/>
        <Hdr sub="Success Map" practiceName={client.answers.practiceName} right={<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>{setSelM(null);setSubview("dashboard");}} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>← Dashboard</button>
          <button onClick={()=>setSubview("form-review")} style={{background:"rgba(255,255,255,0.1)",border:"0.5px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",padding:"6px 12px",borderRadius:6,cursor:"pointer",fontSize:12}}>View Form</button>
          <button onClick={()=>startAssessment(selClient,lat?{...lat.scores}:undefined)} style={{...BTNP,background:GOLD,color:NAVY,fontSize:12,padding:"7px 16px"}}>+ New Month Assessment</button>
        </div>}/>
        <div style={{maxWidth:1060,margin:"0 auto",padding:"24px 20px"}}>
          {/* Summary card */}
          <div style={{...CARD,marginBottom:16,borderLeft:"3px solid "+GOLD}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:GOLD,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Growth Dashboard</div>
                <div style={{fontSize:20,fontWeight:700,color:TEXT}}>{client.answers.practiceName}</div>
                <div style={{fontSize:13,color:MUTED,marginTop:2}}>{allSnaps.length} month{allSnaps.length!==1?"s":""} tracked{fst&&lat?" · "+fst.label+" → "+lat.label:""}</div>
              </div>
              {allSnaps.length>1&&(<div style={{display:"flex",gap:20,alignItems:"center"}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Started</div><div style={{fontSize:28,fontWeight:700,color:"#ef4444"}}>{fstH}%</div><div style={{fontSize:11,color:MUTED}}>{fst.label}</div></div>
                <div style={{fontSize:24,color:"#d0d4e0"}}>→</div>
                <div style={{textAlign:"center"}}><div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Now</div><div style={{fontSize:28,fontWeight:700,color:"#22c55e"}}>{latH}%</div><div style={{fontSize:11,color:MUTED}}>{lat.label}</div></div>
                <div style={{textAlign:"center",padding:"10px 20px",borderRadius:10,background:gain>=0?"rgba(34,197,94,0.08)":"rgba(239,68,68,0.08)",border:"1px solid "+(gain>=0?"rgba(34,197,94,0.25)":"rgba(239,68,68,0.25)")}}>
                  <div style={{fontSize:11,color:MUTED,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Total Growth</div>
                  <div style={{fontSize:28,fontWeight:700,color:gain>=0?"#22c55e":"#ef4444"}}>{gain>=0?"+":""}{gain}%</div>
                </div>
              </div>)}
              {allSnaps.length===0&&<div style={{fontSize:13,color:MUTED,fontStyle:"italic"}}>No assessments yet — click "New Month Assessment" to get started</div>}
            </div>
          </div>

          {allSnaps.length===0?(
            <div style={{...CARD,textAlign:"center",padding:"60px 24px"}}>
              <div style={{width:48,height:48,borderRadius:12,background:"rgba(26,37,88,0.06)",border:"0.5px solid rgba(0,0,0,0.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><span style={{fontSize:20,color:MUTED}}>&#9638;</span></div>
              <div style={{fontSize:16,fontWeight:600,color:TEXT,marginBottom:8}}>No assessments yet</div>
              <div style={{fontSize:13,color:MUTED,marginBottom:20}}>Click "New Month Assessment" to score this client's first Success Map.</div>
              <button onClick={()=>startAssessment(selClient)} style={BTNP}>Start Initial Assessment →</button>
            </div>
          ):(
            <React.Fragment>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
                <div style={{display:"flex",background:"#fff",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:8,padding:3,gap:2}}>
                  {[["table","Table View"],["timeline","Timeline View"]].map(([v,l])=>(<button key={v} onClick={()=>setDv(v)} style={{padding:"5px 16px",borderRadius:6,border:"none",cursor:"pointer",background:dv===v?NAVY:"transparent",color:dv===v?"#fff":MUTED,fontSize:12,fontWeight:dv===v?600:400,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>{l}</button>))}
                </div>
                <div style={{display:"flex",background:"#fff",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:8,padding:3,gap:2}}>
                  {[["3mo","3 Mo"],["6mo","6 Mo"],["1yr","1 Yr"],["month","All"]].map(([v,l])=>(<button key={v} onClick={()=>setTr(v)} style={{padding:"5px 12px",borderRadius:6,border:"none",cursor:"pointer",background:tr===v?NAVY:"transparent",color:tr===v?"#fff":MUTED,fontSize:12,fontWeight:tr===v?600:400,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>{l}</button>))}
                </div>
              </div>
              {dv==="table"?<TableView/>:<TimelineView/>}
            </React.Fragment>
          )}
          <div style={{textAlign:"center",marginTop:16,marginBottom:24,fontSize:12,color:"#c0c6d8"}}>Full-Arch Authority</div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
