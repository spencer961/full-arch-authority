<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg-primary:#ffffff;
    --bg-secondary:#f5f5f4;
    --bg-tertiary:#eeede9;
    --accent:#0b1d5e;
    --accent2:#bc9762;
    --text-primary:#1a1a1a;
    --text-secondary:#555553;
    --text-tertiary:#888786;
    --border-light:rgba(0,0,0,0.12);
    --border-mid:rgba(0,0,0,0.22);
    --border-strong:rgba(0,0,0,0.35);
    --radius-md:8px;
    --radius-lg:12px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg-primary:#1c1c1e;
      --bg-secondary:#2c2c2e;
      --bg-tertiary:#3a3a3c;
      --accent:#0b1d5e;
      --accent2:#bc9762;
      --text-primary:#f2f2f7;
      --text-secondary:#aeaeb2;
      --text-tertiary:#636366;
      --border-light:rgba(255,255,255,0.1);
      --border-mid:rgba(255,255,255,0.18);
      --border-strong:rgba(255,255,255,0.28);
    }
  }
  body{font-family:var(--font);background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh;}
  .app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem;}
  .page-title{font-size:18px;font-weight:700;color:#bc9762;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px;background:#0b1d5e;padding:13px 1rem;letter-spacing:.01em;margin-left:-1rem;margin-right:-1rem;margin-top:-1.5rem;}
  .page-title span{font-size:12px;font-weight:400;color:rgba(255,255,255,0.45);}
  .page-title .title-left{display:flex;flex-direction:column;gap:2px;flex:1;}
  .page-title .title-left .title-main{font-size:17px;font-weight:700;color:#bc9762;line-height:1.2;}
  .page-title .title-left .title-sub{font-size:11px;font-weight:400;color:rgba(255,255,255,0.4);}
  .hdr-right{display:flex;align-items:center;gap:6px;}
  .hdr-icon-btn{width:32px;height:32px;border-radius:7px;border:0.5px solid rgba(255,255,255,0.18);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;color:rgba(255,255,255,0.65);flex-shrink:0;}
  .hdr-icon-btn:hover{background:rgba(255,255,255,0.08);}
  .hdr-icon-btn .notif-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:#bc9762;color:#0b1d5e;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1.5px solid #0b1d5e;padding:0 3px;}
  .hdr-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:10px;border:0.5px solid rgba(0,0,0,0.1);box-shadow:0 8px 24px rgba(0,0,0,0.12);z-index:500;min-width:240px;overflow:hidden;display:none;}
  .hdr-dropdown.open{display:block;}
  .hdr-drop-head{padding:7px 12px;font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;background:var(--bg-secondary);border-bottom:0.5px solid var(--border-light);}
  .hdr-drop-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:0.5px solid var(--border-light);}
  .hdr-drop-row:hover{background:var(--bg-secondary);}
  .hdr-drop-row:last-child{border-bottom:none;}
  .hdr-drop-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .hdr-drop-label{font-size:13px;color:var(--text-primary);font-weight:500;flex:1;}
  .hdr-drop-sub{font-size:11px;color:var(--text-tertiary);margin-top:1px;}
  .hdr-drop-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0;}
  .notif-row{display:flex;gap:10px;padding:10px 12px;border-bottom:0.5px solid var(--border-light);cursor:pointer;}
  .notif-row:hover{background:var(--bg-secondary);}
  .notif-row:last-child{border-bottom:none;}
  .notif-unread-dot{width:7px;height:7px;border-radius:50%;background:#bc9762;flex-shrink:0;margin-top:4px;}
  .notif-read-dot{width:7px;height:7px;border-radius:50%;background:var(--border-mid);flex-shrink:0;margin-top:4px;}

  /* top bar */
  .top-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:1.25rem;}
  .top-bar input{height:36px;padding:0 12px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-primary);font-size:13px;min-width:160px;font-family:var(--font);}
  .top-bar input:focus{outline:none;border-color:var(--border-strong);}
  .btn-primary{height:36px;padding:0 16px;border:none;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;}
  .btn-primary:hover{opacity:.82;}
  .btn-ghost{height:36px;padding:0 14px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);}
  .btn-ghost:hover{background:var(--bg-secondary);}

  /* tabs */
  .view-tabs{display:flex;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);overflow:hidden;width:fit-content;margin-bottom:1.25rem;}
  .vtab{padding:8px 18px;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--text-secondary);border-right:0.5px solid var(--border-light);font-family:var(--font);}
  .vtab:last-child{border-right:none;}
  .vtab.active{background:var(--accent);color:#fff;border-bottom:2px solid var(--accent2);}

  /* pills */
  .pill-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
  .pill{padding:5px 14px;border:0.5px solid var(--border-mid);border-radius:999px;background:var(--bg-primary);color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);}
  .pill:hover{background:var(--bg-secondary);}
  .pill.active{background:var(--accent);color:#fff;border-color:var(--accent2);}

  /* grid & cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .card{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:1rem 1.1rem;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
  .card:hover{border-color:var(--border-strong);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
  .card-head{display:flex;align-items:center;gap:10px;}
  .avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
  .client-name{font-size:14px;font-weight:500;color:var(--text-primary);flex:1;}
  .icon-btn{background:none;border:none;cursor:pointer;color:var(--text-tertiary);padding:3px 5px;border-radius:4px;font-size:14px;line-height:1;font-family:var(--font);}
  .icon-btn:hover{color:var(--text-secondary);background:var(--bg-secondary);}

  /* link chips */
  .link-chip{display:flex;align-items:center;gap:5px;padding:6px 9px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-secondary);font-size:12px;}
  .chip-label{flex:1;color:var(--text-primary);}
  .chip-cat{font-size:11px;color:var(--text-tertiary);}
  .add-row{display:flex;align-items:center;gap:5px;padding:5px 9px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);color:var(--text-tertiary);font-size:12px;cursor:pointer;background:none;width:100%;font-family:var(--font);}
  .add-row:hover{color:var(--text-secondary);}

  /* category view */
  .cat-section{background:var(--bg-primary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px;}
  .cat-head{padding:10px 14px;background:var(--bg-secondary);border-bottom:0.5px solid var(--border-light);display:flex;align-items:center;gap:8px;}
  .cat-title{font-size:13px;font-weight:500;color:var(--text-primary);flex:1;}
  .cat-count{font-size:11px;color:var(--text-tertiary);}
  .crow{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:0.5px solid var(--border-light);}
  .crow:last-child{border-bottom:none;}
  .crow-name{font-size:13px;color:var(--text-primary);flex:1;}
  .crow-url{font-size:11px;color:var(--text-tertiary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .open-btn{font-size:12px;padding:4px 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-primary);color:var(--text-secondary);cursor:pointer;font-family:var(--font);white-space:nowrap;}
  .open-btn:hover{background:var(--bg-secondary);}

  /* queue */
  .queue-notice{background:var(--bg-secondary);border:0.5px solid var(--border-light);border-radius:var(--radius-lg);padding:.9rem 1.1rem;font-size:13px;color:var(--text-secondary);margin-bottom:1rem;line-height:1.6;}
  .q-section-label{font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
  .q-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);margin-bottom:6px;}
  .q-num{width:20px;height:20px;border-radius:50%;background:var(--bg-secondary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-tertiary);}
  .q-info{flex:1;}
  .q-client{font-size:13px;font-weight:500;color:var(--text-primary);}
  .q-cat{font-size:11px;color:var(--text-tertiary);}

  /* detail view */
  .back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-secondary);cursor:pointer;background:none;border:none;margin-bottom:1.25rem;font-family:var(--font);padding:0;}
  .back-btn:hover{color:var(--text-primary);}
  .detail-header{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem;flex-wrap:wrap;}
  .detail-name{font-size:20px;font-weight:600;color:var(--text-primary);}
  .detail-sub{font-size:13px;color:var(--text-tertiary);margin-top:3px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem;}
  @media(max-width:500px){.detail-grid{grid-template-columns:1fr;}}
  .detail-card{background:var(--bg-secondary);border-radius:var(--radius-md);padding:.9rem 1rem;}
  .detail-card-title{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .detail-card-val{font-size:13px;color:var(--text-primary);line-height:1.6;}
  .detail-section-title{font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--accent2);padding-bottom:6px;}
  .links-table{display:flex;flex-direction:column;gap:6px;}
  .lt-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:0.5px solid var(--border-light);border-radius:var(--radius-md);background:var(--bg-primary);flex-wrap:wrap;}
  .lt-label{font-size:13px;color:var(--text-primary);flex:1;min-width:80px;}
  .lt-cat{font-size:11px;color:var(--text-tertiary);background:var(--bg-secondary);border-radius:4px;padding:2px 7px;}
  .lt-url{font-size:11px;color:var(--text-tertiary);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;}
  .modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border-mid);padding:1.5rem;width:100%;max-width:780px;display:flex;flex-direction:column;gap:13px;max-height:90vh;overflow-y:auto;}
  .modal h3{font-size:16px;font-weight:600;color:var(--text-primary);}
  .fgroup{display:flex;flex-direction:column;gap:5px;}
  .flabel{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;}
  .modal input,.modal select,.modal textarea{padding:8px 11px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;width:100%;font-family:var(--font);}
  .modal textarea{resize:vertical;min-height:72px;line-height:1.5;}
  .modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--border-strong);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
  .m-cancel{height:34px;padding:0 14px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);}
  .m-save{height:34px;padding:0 16px;border:none;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;}
  .m-danger{height:34px;padding:0 14px;border:0.5px solid rgba(163,45,45,0.3);border-radius:var(--radius-md);background:transparent;color:#A32D2D;font-size:13px;cursor:pointer;margin-right:auto;font-family:var(--font);}
  .hidden-icon-wrap{flex-shrink:0;cursor:default;display:inline-flex;align-items:center;}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 18px;border-radius:var(--radius-md);z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;}
  #hidden-tooltip-global{position:fixed;background:#E6F1FB;color:#0C447C;font-size:11px;white-space:nowrap;padding:4px 8px;border-radius:4px;pointer-events:none;z-index:9999;display:none;border:0.5px solid #B5D4F4;}
  .muted{color:var(--text-tertiary);font-style:italic;}
</style>
</head>

    {id:11,clientId:6,label:'Success Map',category:'Success Map',url:''},
    {id:12,clientId:6,label:'Metrics Scorecard',category:'Metrics Scorecard',url:''},
    {id:13,clientId:7,label:'Success Map',category:'Success Map',url:''},

const DEFAULT_FIELDS=[
  {key:'doctor',label:'Doctor / primary contact',type:'text',placeholder:'Dr. Jane Smith'},
  {key:'staff',label:'Staff / team contacts',type:'text',placeholder:'Office manager, coordinator...'},
  {key:'timezone',label:'Time zone',type:'timezone',placeholder:''},
  {key:'website',label:'Website',type:'text',placeholder:'https://www.example.com'},
  {key:'numLocations',label:'No. of locations',type:'text',placeholder:'e.g. 1'},
  {key:'locations',label:'Practice location names',type:'textarea',placeholder:'e.g. Main Office, North Branch'},
  {key:'notes',label:'Notes',type:'textarea',placeholder:'Any other info...'},
];



function addClientNote(clientId){
  const el=document.getElementById('cnote-new');
  if(!el)return;
  const text=el.value.trim();
  if(!text)return;
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  if(!Array.isArray(c.notesLog)) c.notesLog=[];
  c.notesLog.push({date:fmtDate(),text,edited:false});
  save();openDetail(clientId);
}

function startEditClientNote(clientId,noteIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c||!Array.isArray(c.notesLog))return;
  const entry=c.notesLog[noteIdx];
  if(!entry)return;
  const actionsEl=document.getElementById('cnote-actions-'+noteIdx);
  if(!actionsEl)return;
  const orig=actionsEl.innerHTML;
  actionsEl.innerHTML=`<textarea id="cnote-edit-${noteIdx}" rows="2" style="width:100%;padding:6px 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);resize:vertical;margin-bottom:6px;">${esc(entry.text)}</textarea>
    <div style="display:flex;gap:6px;">
      <button onclick="cancelEditClientNote(${clientId},${noteIdx})" style="height:28px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);">Cancel</button>
      <button onclick="saveClientNoteEdit(${clientId},${noteIdx})" style="height:28px;padding:0 10px;border:none;border-radius:4px;background:var(--accent);color:#fff;font-size:12px;cursor:pointer;font-family:var(--font);">Save</button>
    </div>`;
  actionsEl._origHtml=orig;
  setTimeout(()=>{const t=document.getElementById('cnote-edit-'+noteIdx);if(t){t.focus();t.setSelectionRange(t.value.length,t.value.length);}},50);
}

function cancelEditClientNote(clientId,noteIdx){
  const el=document.getElementById('cnote-actions-'+noteIdx);
  if(el&&el._origHtml) el.innerHTML=el._origHtml;
}

function saveClientNoteEdit(clientId,noteIdx){
  const ta=document.getElementById('cnote-edit-'+noteIdx);
  if(!ta)return;
  const newText=ta.value.trim();
  if(!newText)return;
  const c=S.clients.find(x=>x.id===clientId);
  if(!c||!Array.isArray(c.notesLog))return;
  const entry=c.notesLog[noteIdx];
  if(!entry)return;
  if(!Array.isArray(entry.history)) entry.history=[];
  entry.history.push({text:entry.text,date:entry.date});
  entry.originalDate=entry.originalDate||entry.date;
  entry.text=newText;
  entry.editedAt=fmtDate();
  entry.edited=true;
  save();openDetail(clientId);
}

function viewClientNoteHistory(clientId,noteIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c||!Array.isArray(c.notesLog))return;
  const entry=c.notesLog[noteIdx];
  if(!entry||!Array.isArray(entry.history))return;
  const rows=[...entry.history].reverse().map((h,i)=>`
    <div style="padding:8px 0;border-bottom:0.5px solid var(--border-light);">
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:3px;">${esc(h.date)}</div>

function showHiddenTooltip(e,text){
  let t=document.getElementById('hidden-tooltip-global');
  if(!t){t=document.createElement('div');t.id='hidden-tooltip-global';document.body.appendChild(t);}
  t.textContent=text||'Hidden from client mode';
  t.style.display='block';
  const r=e.currentTarget.getBoundingClientRect();
  const tw=t.offsetWidth;
  const th=t.offsetHeight;
  let left=r.left+r.width/2-tw/2;
  let top=r.top-th-6;
  const pad=8;
  if(left<pad) left=pad;
  if(left+tw>window.innerWidth-pad) left=window.innerWidth-tw-pad;
  if(top<pad) top=r.bottom+6;
  t.style.left=left+'px';
  t.style.top=top+'px';
}
function hideHiddenTooltip(){
  const t=document.getElementById('hidden-tooltip-global');
  if(t) t.style.display='none';
}

function setSyncStatus(s){
  const el=document.getElementById('sync-dot');
  if(!el)return;
  el.title=s==='saving'?'Saving…':s==='saved'?'Saved':s==='error'?'Sync error':'';
  el.style.background=s==='saved'?'#4ade80':s==='error'?'#A32D2D':s==='saving'?'#f59e0b':'var(--border-mid)';

async function pushToSupabase(){
  if(!_supabaseLoaded) return; // never overwrite before we've loaded
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state`,{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:STATE_ID,data:S,updated_at:new Date().toISOString()})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    setSyncStatus('saved');
    setTimeout(()=>setSyncStatus('idle'),3000);
  }catch(e){
    setSyncStatus('error');
    console.warn('Supabase sync error:',e);
  }
}

async function loadFromSupabase(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_state?id=eq.${STATE_ID}&select=data`,{headers:SB_HEADERS});
    const rows=await res.json();
    if(rows&&rows.length&&rows[0].data){
      S=rows[0].data;
      migrateData();
      localStorage.setItem('gmj_dashboard',JSON.stringify(S));
      setSyncStatus('saved');
      setTimeout(()=>setSyncStatus('idle'),2000);
      render();
    }
  }catch(e){
    setSyncStatus('error');
    console.warn('Could not load from Supabase:',e);
  }finally{
    _supabaseLoaded=true; // safe to push now regardless of outcome
  }
}

function renderClients(){
  const visibleRaw=filter==='all'?S.clients:S.clients.filter(c=>String(c.id)===String(filter));
  const visible=[...visibleRaw].sort((a,b)=>{
    const aMulti=Array.isArray(a.practices)&&a.practices.length>1?1:0;
    const bMulti=Array.isArray(b.practices)&&b.practices.length>1?1:0;
    return aMulti-bMulti;
  });
  if(!visible.length){document.getElementById('main').innerHTML='<div class="empty">No clients yet. Add one above.</div>';return;}
  let html='<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(270px,1fr));">';
  visible.forEach(c=>{
    const col=COLORS[c.ci%COLORS.length];
    const links=S.links.filter(l=>l.clientId===c.id);
    const practices=getPractices(c);
    const hasMultiple=practices.length>1;
    const curPractice=activePractice[c.id]||null;
    const tabItems=[{label:'All',val:null},...practices.map(p=>({label:p,val:p}))];
    const rows=[];
    for(let i=0;i<tabItems.length;i+=3) rows.push(tabItems.slice(i,i+3));
    const tabBar=hasMultiple?`<div style="display:flex;flex-direction:column;gap:0;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);overflow:hidden;margin-bottom:8px;width:100%;" onclick="event.stopPropagation()">
      ${rows.map((row,ri)=>`<div style="display:flex;border-bottom:${ri<rows.length-1?'0.5px solid var(--border-light)':'none'};">
        ${row.map((t,ti)=>{
          const isAll=t.val===null;
          const isActive=t.val===curPractice;
          return`<button onclick="event.stopPropagation();activePractice[${c.id}]=${t.val===null?'null':`'${esc(t.val)}'`};render()" style="${isAll?'flex:0 0 36px;':'flex:1;'}padding:5px 6px;font-size:11px;border:none;cursor:pointer;font-family:var(--font);background:${isAll?'var(--bg-tertiary)':'transparent'};color:${isActive?'var(--text-primary)':'var(--text-tertiary)'};font-weight:${isActive?'500':'400'};border-right:${ti<row.length-1?'0.5px solid var(--border-light)':'none'};border-bottom:${isActive?'2px solid var(--text-primary)':'2px solid transparent'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(t.label)}</button>`;
        }).join('')}
      </div>`).join('')}
    </div>`:'';

    const visibleLinks=links.filter(l=>{
      if(hasMultiple&&curPractice&&l.practice&&l.practice!==curPractice) return false;
      if(clientMode){
        const cat=l.category;
        const globalHidden=Array.isArray(S.hiddenCategories)&&S.hiddenCategories.includes(cat);
        const override=c.categoryOverrides&&c.categoryOverrides[cat];
        if(globalHidden&&override!=='show') return false;
        if(!globalHidden&&override==='hidden') return false;
      }
      return true;
    });
    const PRACTICE_PALETTE=[
      {bg:'#E6F1FB',txt:'#0C447C'},
      {bg:'#FAEEDA',txt:'#633806'},
      {bg:'#E1F5EE',txt:'#085041'},
      {bg:'#FBEAF0',txt:'#72243E'},
      {bg:'#EEEDFE',txt:'#3C3489'},
      {bg:'#EAF3DE',txt:'#274F0A'},
      {bg:'#FAECE7',txt:'#712B13'},
      {bg:'#FCEBEB',txt:'#791F1F'},
    ];
    const storedColors=c.practiceColors||{};
    const practiceColorMap={};
    practices.forEach((p,i)=>{
      practiceColorMap[p]=storedColors[p]||PRACTICE_PALETTE[i%PRACTICE_PALETTE.length];
    });

    const isReordering=reorderClientId===c.id;
    const reorderBar=isReordering&&editMode&&!clientMode?`<div style="display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 8px;background:rgba(11,29,94,0.05);border-radius:6px;border:0.5px solid rgba(11,29,94,0.15);margin-bottom:8px;" onclick="event.stopPropagation()">

    let chips=visibleLinks.map(l=>{

          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>

      if(isReordering){
        return`<div class="link-chip" data-link-id="${l.id}" draggable="true" style="cursor:grab;" onclick="event.stopPropagation()">

          <svg style="width:13px;height:13px;flex-shrink:0;opacity:0.4;" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="5.5" x2="13" y2="5.5" stroke="currentColor" stroke-width="1"/><line x1="5" y1="5.5" x2="5" y2="12" stroke="currentColor" stroke-width="1"/></svg>
          <span class="chip-label">${esc(l.label)}</span>
          ${hasMultiple&&l.practice?(()=>{const pc=practiceColorMap[l.practice]||PRACTICE_PALETTE[0];return`<span style="font-size:10px;color:${pc.txt};background:${pc.bg};border-radius:3px;padding:1px 6px;flex-shrink:0;white-space:nowrap;font-weight:500;">${esc(l.practice)}</span>`;})():''}

        ${hasMultiple&&l.practice?(()=>{const pc=practiceColorMap[l.practice]||PRACTICE_PALETTE[0];return`<span style="font-size:10px;color:${pc.txt};background:${pc.bg};border-radius:3px;padding:1px 6px;flex-shrink:0;white-space:nowrap;font-weight:500;">${esc(l.practice)}</span>`;})():''}
        ${!l.url?'<span style="font-size:10px;color:var(--text-tertiary);font-style:italic;">no url</span>':''}

        ${editMode&&!clientMode?`<button class="icon-btn" onclick="event.stopPropagation();openLinkModal(${l.id},null)" title="Edit" style="transform:scaleX(-1);">✎</button>
        <button class="icon-btn" onclick="event.stopPropagation();deleteLink(${l.id})" title="Delete">×</button>`:''}

    }).join('');
    const chipsWrapper=visibleLinks.length>6
      ?`<div id="chips-${c.id}" style="max-height:210px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;">${chips}</div>`
      :`<div id="chips-${c.id}" style="display:flex;flex-direction:column;gap:5px;">${chips}</div>`;
    const inf=c.info||{};
    const metaParts=[inf.doctor,inf.timezone?inf.timezone.split('—')[0].trim():''].filter(Boolean);

    const payments=Array.isArray(c.payments)?c.payments:[];

    const billing=c.billing||{};
    const monthlyAmt=billing.monthlyAmount?`$${Number(billing.monthlyAmount).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`:'';
    const billingDay=billing.billingDay?parseInt(billing.billingDay):null;

    let pastDueHtml='';
    if(billingDay){
      const today=new Date();
      const thisMonthDue=new Date(today.getFullYear(),today.getMonth(),billingDay);
      const lastPayDate=lastPay?new Date(lastPay.date+'T12:00:00'):null;

function initReorderDrag(clientId){
  const container=document.getElementById('chips-'+clientId);
  if(!container)return;
  let dragEl=null,didDrag=false;
  container.querySelectorAll('.link-chip[draggable]').forEach(chip=>{
    chip.addEventListener('dragstart',e=>{dragEl=chip;didDrag=false;setTimeout(()=>chip.style.opacity='0.4',0);});
    chip.addEventListener('drag',()=>{didDrag=true;});
    chip.addEventListener('dragend',()=>{
      chip.style.opacity='1';
      container.querySelectorAll('.link-chip').forEach(c=>c.style.borderTop='');
      dragEl=null;didDrag=false;
    });
    chip.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===chip)return;
      const rect=chip.getBoundingClientRect();
      container.querySelectorAll('.link-chip').forEach(c=>c.style.borderTop='');
      if(e.clientY<rect.top+rect.height/2) chip.style.borderTop='2px solid var(--accent)';
    });
    chip.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===chip)return;
      const rect=chip.getBoundingClientRect();
      if(e.clientY<rect.top+rect.height/2) container.insertBefore(dragEl,chip);
      else container.insertBefore(dragEl,chip.nextSibling);
      container.querySelectorAll('.link-chip').forEach(c=>c.style.borderTop='');
    });
  });
}

function saveFileOrder(clientId,forAll){
  const container=document.getElementById('chips-'+clientId);
  if(!container)return;
  const orderedIds=[...container.querySelectorAll('.link-chip[data-link-id]')].map(c=>parseInt(c.dataset.linkId));
  const clientLinks=S.links.filter(l=>l.clientId===clientId);
  const otherLinks=S.links.filter(l=>l.clientId!==clientId);
  const reordered=orderedIds.map(id=>clientLinks.find(l=>l.id===id)).filter(Boolean);
  const remaining=clientLinks.filter(l=>!orderedIds.includes(l.id));
  const newOrder=[...reordered,...remaining];
  if(forAll){
    // Apply same category order to all clients
    const catOrder=newOrder.map(l=>l.category);
    S.clients.forEach(cl=>{
      const clLinks=S.links.filter(l=>l.clientId===cl.id);
      const sorted=[...clLinks].sort((a,b)=>{
        const ai=catOrder.indexOf(a.category);
        const bi=catOrder.indexOf(b.category);
        return(ai===-1?999:ai)-(bi===-1?999:bi);
      });
      S.links=S.links.filter(l=>l.clientId!==cl.id).concat(sorted);
    });
  } else {
    S.links=[...otherLinks,...newOrder];
  }
  reorderClientId=null;
  save();render();
  showToast(forAll?'File order saved for all clients':'File order saved');
}

function renderCategory(){
  const allCats=cats();
  const visible=filter==='all'?allCats:allCats.filter(c=>String(c)===String(filter));
  if(!visible.length){document.getElementById('main').innerHTML='<div class="empty">No categories yet. Add links first.</div>';return;}
  let html='';
  visible.forEach(cat=>{
    const catLinks=S.links.filter(l=>l.category===cat);
    let rows='';
    catLinks.forEach(l=>{
      const client=S.clients.find(c=>c.id===l.clientId);
      if(!client)return;
      const col=COLORS[client.ci%COLORS.length];
      rows+=`<div class="crow">
        <div class="avatar" style="width:26px;height:26px;font-size:10px;background:${col.bg};color:${col.txt};">${ini(client.name)}</div>
        <span class="crow-name">${esc(client.name)}</span>
        <span class="crow-url" title="${esc(l.url)}">${esc(l.url)}</span>
        <button class="icon-btn" onclick="openLinkModal(${l.id},null)" title="Edit" style="transform:scaleX(-1);${clientMode?'display:none;':''}">✎</button>
        <button class="open-btn" onclick="window.open('${esc(l.url)}','_blank')">Open →</button>
      </div>`;
    });
    html+=`<div class="cat-section">
      <div class="cat-head"><span class="cat-title">${esc(cat)}</span><span class="cat-count">${catLinks.length} client${catLinks.length!==1?'s':''}</span></div>
      <div>${rows||'<div class="crow" style="color:var(--text-tertiary);font-size:13px;">No clients</div>'}</div>
    </div>`;
  });
  document.getElementById('main').innerHTML=html;
}

function renderQueue(){
  const allCats=cats();
  let html=`<div class="queue-notice"><strong>How to use:</strong> Click <strong>Open →</strong> to launch the sheet in a new tab. Work on it, close the tab, and click the next client to keep moving down the list.</div>`;
  if(!allCats.length){html+='<div class="empty">No files yet. Add some first.</div>';}
  allCats.forEach(cat=>{
    html+=`<div style="margin-bottom:1.5rem;"><div class="q-section-label">${esc(cat)}</div>`;
    S.links.filter(l=>l.category===cat).forEach((l,i)=>{
      const client=S.clients.find(c=>c.id===l.clientId);
      if(!client)return;
      const col=COLORS[client.ci%COLORS.length];
      html+=`<div class="q-item">
        <div class="q-num">${i+1}</div>
        <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${col.bg};color:${col.txt};">${ini(client.name)}</div>
        <div class="q-info"><div class="q-client">${esc(client.name)}</div><div class="q-cat">${esc(cat)}</div></div>
        <button class="open-btn" onclick="window.open('${esc(l.url)}','_blank')">Open →</button>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('main').innerHTML=html;
}

function renderDetail(app){
  const c=S.clients.find(x=>x.id===detailId);
  if(!c){detailId=null;render();return;}
  const col=COLORS[c.ci%COLORS.length];
  const inf=c.info||{};
  const links=S.links.filter(l=>l.clientId===c.id);
  const practices=getPractices(c);
  const hasMultiplePractices=practices.length>1;
  const detailActivePractice=window._detailPractice&&window._detailPractice.clientId===c.id?window._detailPractice.val:null;

  const visibleLinks=links.filter(l=>{
    if(hasMultiplePractices&&detailActivePractice&&l.practice&&l.practice!==detailActivePractice) return false;
    if(clientMode){
      const cat=l.category;
      const globalHidden=Array.isArray(S.hiddenCategories)&&S.hiddenCategories.includes(cat);
      const override=c.categoryOverrides&&c.categoryOverrides[cat];
      if(globalHidden&&override!=='show') return false;
      if(!globalHidden&&override==='hidden') return false;
    }
    return true;
  });

  const practiceTabBar=hasMultiplePractices?`
    <div style="display:flex;gap:0;flex-wrap:wrap;margin-bottom:10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);overflow:hidden;width:fit-content;">
      <button onclick="window._detailPractice={clientId:${c.id},val:null};renderDetail(document.getElementById('app'))" style="padding:5px 12px;font-size:12px;border:none;cursor:pointer;font-family:var(--font);background:${!detailActivePractice?'var(--bg-tertiary)':'transparent'};color:${!detailActivePractice?'var(--text-primary)':'var(--text-tertiary)'};font-weight:${!detailActivePractice?'500':'400'};border-right:0.5px solid var(--border-light);border-bottom:${!detailActivePractice?'2px solid var(--text-primary)':'2px solid transparent'};">All</button>
      ${practices.map((p,i)=>`<button onclick="window._detailPractice={clientId:${c.id},val:'${esc(p)}'};renderDetail(document.getElementById('app'))" style="padding:5px 12px;font-size:12px;border:none;cursor:pointer;font-family:var(--font);background:transparent;color:${detailActivePractice===p?'var(--text-primary)':'var(--text-tertiary)'};font-weight:${detailActivePractice===p?'500':'400'};${i<practices.length-1?'border-right:0.5px solid var(--border-light);':''}border-bottom:${detailActivePractice===p?'2px solid var(--text-primary)':'2px solid transparent'};">${esc(p)}</button>`).join('')}
    </div>`:'';

  const linksHtml=visibleLinks.map(l=>`
    <div class="lt-row">
      <span class="lt-label">${esc(l.label)}</span>
      <span class="lt-cat">${esc(l.category)}</span>
      ${l.practice?`<span style="font-size:11px;color:var(--text-tertiary);background:var(--bg-secondary);border-radius:4px;padding:1px 6px;">${esc(l.practice)}</span>`:''}
      <span class="lt-url" title="${esc(l.url)}">${esc(l.url)}</span>
      <button class="open-btn" onclick="window.open('${esc(l.url)}','_blank')">Open</button>
      ${clientMode?'':`<button class="icon-btn" onclick="openLinkModal(${l.id},null)" title="Edit" style="transform:scaleX(-1);">✎</button>
      <button class="icon-btn" onclick="deleteLink(${l.id})" title="Delete">×</button>`}
    </div>`).join('')||'<div style="font-size:13px;color:var(--text-tertiary);font-style:italic;padding:.5rem 0;">No files yet.</div>';

  const CLIENT_MODE_FIELDS=['doctor','timezone','numLocations','locations'];
  const fields=clientMode
    ?getClientFields(c.id).filter(f=>CLIENT_MODE_FIELDS.includes(f.key))
    :getClientFields(c.id);
  const fieldCards=fields.map(f=>{
    const v=inf[f.key];
    const span=(f.type==='textarea'||f.key==='notes'||f.key==='locations')?'grid-column:1/-1;':'';
    if(f.key==='staff'){
      let staffArr=[];
      try{staffArr=JSON.parse(v||'[]');}catch(e){if(v)staffArr=[{name:v,title:'',phone:''}];}
      const staffHtml=staffArr.length?`
        <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:var(--bg-tertiary);border-bottom:0.5px solid var(--border-light);padding:5px 10px;gap:0;">
            ${['Name','Title / Role','Phone','Email'].map(h=>`<div style="font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;">${h}</div>`).join('')}
          </div>
          ${staffArr.map((m,i)=>`
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:7px 10px;gap:0;border-bottom:${i<staffArr.length-1?'0.5px solid var(--border-light)':'none'};background:var(--bg-primary);">
            <div style="font-size:12px;font-weight:500;padding-right:8px;"><button onclick="openStaffProfile(${c.id},${i})" style="background:none;border:none;font-size:12px;font-weight:500;color:var(--text-primary);cursor:pointer;font-family:var(--font);padding:0;text-align:left;text-decoration:underline;text-decoration-color:var(--border-mid);text-underline-offset:2px;">${esc(m.name)||'—'}</button></div>
            <div style="font-size:12px;color:var(--text-secondary);padding-right:8px;">${esc(m.title)||'—'}</div>
            <div style="font-size:12px;color:var(--text-tertiary);padding-right:8px;">${esc(m.phone)||'—'}</div>
            <div style="font-size:12px;color:var(--text-tertiary);">${esc(m.email)||'—'}</div>
          </div>`).join('')}
        </div>`:'<span class="muted">—</span>';
      return`<div class="detail-card" style="grid-column:1/-1;"><div class="detail-card-title">${esc(f.label)}</div><div class="detail-card-val">${staffHtml}</div></div>`;
    }
    if(f.key==='notes'){
      const notesLog=Array.isArray(c.notesLog)?c.notesLog:[];
      const showHistory=!S.adminSettings||S.adminSettings.showEditHistory!==false;
      const noteEntries=notesLog.map((entry,origIdx)=>{
        const showThisHistory=showHistory&&entry.edited&&!entry.hideHistory;
        const displayDate=showThisHistory&&entry.editedAt
          ?`${esc(entry.originalDate||entry.date)} · edited ${esc(entry.editedAt)}`
          :esc(entry.date);
        return`<div style="border-bottom:0.5px solid var(--border-light);padding:8px 0;" id="cnote-actions-${origIdx}">
          <div style="font-size:13px;color:var(--text-primary);line-height:1.6;margin-bottom:4px;">${esc(entry.text)}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="font-size:10px;color:var(--text-tertiary);flex:1;">${displayDate}${showThisHistory?' <span style="font-style:italic;">(edited)</span>':''}</span>
            ${showThisHistory&&Array.isArray(entry.history)&&entry.history.length?`<button onclick="viewClientNoteHistory(${c.id},${origIdx})" style="font-size:10px;padding:1px 6px;border:none;border-radius:3px;background:transparent;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);text-decoration:underline;text-underline-offset:2px;">see changes</button>`:''}
            <button onclick="startEditClientNote(${c.id},${origIdx})" style="font-size:11px;padding:2px 8px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);">Edit</button>
            <button onclick="inlineDeleteClientNote(${c.id},${origIdx})" style="font-size:11px;padding:2px 8px;border:0.5px solid rgba(163,45,45,0.3);border-radius:4px;background:transparent;color:#A32D2D;cursor:pointer;font-family:var(--font);">Delete</button>
          </div>
        </div>`;
      }).join('');
      const notesHtml=`<div style="display:flex;flex-direction:column;gap:0;margin-bottom:10px;">${noteEntries||'<div style="font-size:12px;color:var(--text-tertiary);font-style:italic;padding:4px 0;">No notes yet.</div>'}</div>
        <div style="display:flex;gap:6px;align-items:flex-start;">
          <textarea id="cnote-new" rows="2" placeholder="Add a note…" style="flex:1;padding:6px 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);resize:vertical;"></textarea>
          <button onclick="addClientNote(${c.id})" style="height:34px;padding:0 12px;border:none;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-size:12px;cursor:pointer;font-family:var(--font);white-space:nowrap;">Add note</button>
        </div>`;
      return`<div class="detail-card" style="grid-column:1/-1;"><div class="detail-card-title">${esc(f.label)}</div>${notesHtml}</div>`;
    }
    return`<div class="detail-card" style="${span}"><div class="detail-card-title">${esc(f.label)}</div><div class="detail-card-val">${v?esc(v):'<span class="muted">—</span>'}</div></div>`;
  }).join('');

  if(clientMode){
    const doctor=inf.doctor||'';
    const timezone=inf.timezone?inf.timezone.split('—')[0].trim():'';
    const numLocations=inf.numLocations||'';
    const locations=inf.locations||'';

    const infoRow=[
      doctor?`<div style="display:flex;flex-direction:column;gap:2px;"><div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;">Doctor</div><div style="font-size:14px;font-weight:500;color:var(--text-primary);">${esc(doctor)}</div></div>`:'',
      timezone?`<div style="display:flex;flex-direction:column;gap:2px;"><div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;">Time zone</div><div style="font-size:14px;color:var(--text-primary);">${esc(timezone)}</div></div>`:'',
      numLocations?`<div style="display:flex;flex-direction:column;gap:2px;"><div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;">Locations</div><div style="font-size:14px;color:var(--text-primary);">${esc(numLocations)}</div></div>`:'',
    ].filter(Boolean).join('');

    app.innerHTML=`
      <button class="back-btn" onclick="detailId=null;render()">← Back</button>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border-light);">
        <div class="avatar" style="width:56px;height:56px;font-size:20px;font-weight:600;background:${col.bg};color:${col.txt};flex-shrink:0;">${ini(c.name)}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:22px;font-weight:600;color:var(--text-primary);line-height:1.2;">${esc(c.name)}</div>
          ${hasMultiplePractices?`<div style="font-size:12px;color:var(--text-tertiary);margin-top:4px;">${practices.join(' · ')}</div>`:''}
        </div>
      </div>
      ${infoRow?`<div style="display:flex;gap:2rem;flex-wrap:wrap;margin-bottom:1.5rem;padding:1rem 1.25rem;background:var(--bg-secondary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);">${infoRow}</div>`:''}
      ${locations?`<div style="margin-bottom:1.5rem;padding:1rem 1.25rem;background:var(--bg-secondary);border-radius:var(--radius-lg);border:0.5px solid var(--border-light);"><div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">Practice locations</div><div style="font-size:13px;color:var(--text-primary);line-height:1.8;white-space:pre-wrap;">${esc(locations)}</div></div>`:''}
      <div style="font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:10px;display:flex;align-items:center;gap:8px;">Files <span style="font-size:12px;font-weight:400;color:var(--text-tertiary);">${visibleLinks.length} file${visibleLinks.length!==1?'s':''}</span></div>
      ${practiceTabBar}
      <div class="links-table">${linksHtml}</div>`;
    return;
  }
  const nlocF=fields.find(f=>f.key==='numLocations');
  const tzF=fields.find(f=>f.key==='timezone');
  const subParts=[];
  if(nlocF&&inf.numLocations) subParts.push(inf.numLocations+' location'+(inf.numLocations!='1'?'s':''));
  if(tzF&&inf.timezone) subParts.push(inf.timezone);

  app.innerHTML=`
    <button class="back-btn" onclick="detailId=null;render()">← Back to all clients</button>
    <div class="detail-header">
      <div class="avatar" style="width:52px;height:52px;font-size:18px;font-weight:600;background:${col.bg};color:${col.txt};">${ini(c.name)}</div>
      <div style="flex:1;">
        <div class="detail-name">${esc(c.name)}</div>
        <div class="detail-sub">${subParts.join(' · ')||'No profile info yet'}</div>
      </div>
      ${clientMode?'':` <button class="btn-ghost" onclick="openClientModal(${c.id})">Edit profile</button>
      <button class="btn-ghost" style="color:#A32D2D;border-color:rgba(163,45,45,0.3);" onclick="confirmDeleteClient(${c.id})">Delete client</button>`}
    </div>
    <div class="detail-grid">${fieldCards}</div>
    <div class="detail-section-title">
      Files
      ${clientMode?'':` <button class="btn-ghost" style="height:30px;font-size:12px;padding:0 12px;" onclick="openLinkModal(null,${c.id})">+ Add file</button>`}
    </div>
    ${practiceTabBar}
    <div class="links-table">${linksHtml}</div>`;
}

function showModal(inner){
  let overlay=document.getElementById('modal-overlay');
  if(!overlay){overlay=document.createElement('div');overlay.id='modal-overlay';overlay.className='modal-overlay';document.body.appendChild(overlay);}
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()" style="position:relative;">
    <button onclick="closeModal()" style="position:absolute;top:10px;right:12px;background:none;border:none;font-size:18px;color:var(--text-tertiary);cursor:pointer;line-height:1;padding:0;font-family:var(--font);">×</button>
    ${inner}</div>`;
  overlay.onclick=closeModal;
}
function closeModal(){const o=document.getElementById('modal-overlay');if(o)o.remove();}

function showConfirm(inner){
  let overlay=document.getElementById('confirm-overlay');
  if(!overlay){overlay=document.createElement('div');overlay.id='confirm-overlay';overlay.className='modal-overlay';overlay.style.zIndex='1001';document.body.appendChild(overlay);}
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">${inner}</div>`;
  overlay.onclick=closeConfirm;
}
function closeConfirm(){const o=document.getElementById('confirm-overlay');if(o)o.remove();}

function getStaffArr(c){
  let staffArr=[];
  try{staffArr=JSON.parse(c.info.staff||'[]');}catch(e){if(c.info&&c.info.staff)staffArr=[{name:c.info.staff,title:'',phone:'',email:'',notesLog:[]}];}
  return staffArr;
}

function fmtDate(){
  const now=new Date();
  return now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' at '+now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function openStaffProfile(clientId,staffIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  const m=staffArr[staffIdx];
  if(!m)return;
  const col=COLORS[c.ci%COLORS.length];
  const log=Array.isArray(m.notesLog)?m.notesLog:[];
  const showHistory=!(S.adminSettings&&S.adminSettings.hideEditHistory);

  const logHtml=log.length?[...log].map((entry,i)=>({entry,origIdx:i})).reverse().map(({entry,origIdx})=>{
    const showThisHistory=showHistory&&entry.edited&&!entry.hideHistory;
    const displayDate=showThisHistory&&entry.editedAt
      ?`${esc(entry.originalDate||entry.date)} · edited ${esc(entry.editedAt)}`
      :esc(entry.originalDate||entry.date);
    return`
    <div style="padding:10px 12px;border-bottom:0.5px solid var(--border-light);background:var(--bg-primary);" id="note-row-${origIdx}">
      <div id="note-actions-${origIdx}" style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;">
        <span style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;flex:1;">
          ${displayDate}${showThisHistory?` <span style="font-style:italic;color:var(--text-tertiary);">(edited)</span>`:''}
        </span>
        ${showThisHistory&&Array.isArray(entry.history)&&entry.history.length?`<button onclick="viewNoteHistory(${origIdx})" style="font-size:10px;padding:1px 6px;border:none;border-radius:3px;background:transparent;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--border-mid);">see changes</button>`:''}
        <button onclick="startEditNote(${clientId},${staffIdx},${origIdx})" style="font-size:11px;padding:2px 8px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);">Edit</button>
        <button onclick="inlineDeleteNote(${clientId},${staffIdx},${origIdx})" style="font-size:11px;padding:2px 8px;border:0.5px solid rgba(163,45,45,0.3);border-radius:4px;background:transparent;color:#A32D2D;cursor:pointer;font-family:var(--font);">Delete</button>
      </div>
      <div id="note-text-${origIdx}" style="font-size:13px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;">${esc(entry.text)}</div>
      <div id="note-history-${origIdx}" style="display:none;margin-top:8px;border-top:0.5px solid var(--border-light);padding-top:8px;">
        ${Array.isArray(entry.history)?entry.history.map((h,hi)=>`
          <div style="margin-bottom:6px;">
            <div style="font-size:10px;color:var(--text-tertiary);margin-bottom:2px;">Version ${hi+1} — ${esc(h.date)}</div>
            <div style="font-size:12px;color:var(--text-secondary);line-height:1.5;white-space:pre-wrap;padding:6px 8px;background:var(--bg-secondary);border-radius:4px;">${esc(h.text)}</div>
          </div>`).join(''):''}
      </div>
      <div id="note-edit-${origIdx}" style="display:none;">
        <textarea id="note-edit-ta-${origIdx}" style="width:100%;padding:6px 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-family:var(--font);font-size:13px;resize:vertical;min-height:60px;line-height:1.6;margin-top:4px;">${esc(entry.text)}</textarea>
        <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:5px;">
          <button onclick="cancelEditNote(${origIdx})" style="font-size:11px;padding:3px 10px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);">Cancel</button>
          <button onclick="confirmSaveNote(${clientId},${staffIdx},${origIdx})" style="font-size:11px;padding:3px 10px;border:none;border-radius:4px;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--font);">Save edit</button>
        </div>
      </div>
    </div>`;}).join('')
    :`<div style="font-size:12px;color:var(--text-tertiary);font-style:italic;padding:10px;">No notes yet.</div>`;

  showModal(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div style="width:44px;height:44px;border-radius:50%;background:${col.bg};color:${col.txt};display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;">${ini(m.name||'?')}</div>
      <div style="flex:1;">
        <div style="font-size:16px;font-weight:500;color:var(--text-primary);">${esc(m.name||'—')}</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">${esc(c.name)}</div>
      </div>
      <button onclick="promptAdminSettings(${clientId},${staffIdx})" style="background:none;border:none;font-size:11px;color:var(--text-tertiary);cursor:pointer;font-family:var(--font);padding:2px 4px;" title="Admin settings">⚙</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="detail-card"><div class="detail-card-title">Title / Role</div>
        <input id="sp-title" value="${esc(m.title||'')}" placeholder="—" style="width:100%;background:transparent;border:none;font-size:13px;color:var(--text-primary);font-family:var(--font);padding:0;margin-top:2px;"/>
      </div>
      <div class="detail-card"><div class="detail-card-title">Phone</div>

function checkAdminPassword(clientId,staffIdx){

function doResetNotesSettings(clientId,staffIdx){
  const c=S.clients.find(x=>x.id===clientId);

  const staffArr=getStaffArr(c);

function openNoteHistoryManager(clientId,staffIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  const m=staffArr[staffIdx];
  const log=Array.isArray(m.notesLog)?m.notesLog:[];
  const editedNotes=log.map((e,i)=>({entry:e,idx:i})).filter(({entry})=>entry.edited);

  if(!editedNotes.length){
    showModal(`
      <h3>Manage note history</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:1.6;">No edited notes found for this contact.</p>
      <div class="modal-actions"><button class="m-cancel" onclick="openAdminSettings(${clientId},${staffIdx})">← Back</button></div>`);
    return;
  }

  const rows=editedNotes.map(({entry,idx})=>{
    const suppressed=!!entry.hideHistory;
    const preview=entry.text.length>60?entry.text.slice(0,60)+'…':entry.text;
    return`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-bottom:0.5px solid var(--border-light);">
      <div style="flex:1;">
        <div style="font-size:11px;color:var(--text-tertiary);margin-bottom:3px;">${esc(entry.date)}</div>
        <div style="font-size:12px;color:var(--text-primary);line-height:1.5;">${esc(preview)}</div>
        <div style="font-size:11px;margin-top:4px;color:${suppressed?'#A32D2D':'var(--text-tertiary)'};">${suppressed?'History hidden':'History visible'}</div>
      </div>
      <button onclick="toggleNoteHistoryVisibility(${clientId},${staffIdx},${idx})" style="flex-shrink:0;height:28px;padding:0 12px;border:0.5px solid ${suppressed?'rgba(163,45,45,0.3)':'var(--border-mid)'};border-radius:var(--radius-md);background:transparent;color:${suppressed?'#A32D2D':'var(--text-secondary)'};font-size:11px;cursor:pointer;font-family:var(--font);white-space:nowrap;">
        ${suppressed?'Show history':'Hide history'}
      </button>
    </div>`;
  }).join('');

  showModal(`
    <h3>Manage note history</h3>
    <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:10px;">Toggle visibility of "(edited)" and "See changes" per note. History data is always preserved.</p>
    <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;max-height:300px;overflow-y:auto;">
      ${rows}
    </div>
    <div class="modal-actions" style="margin-top:10px;">
      <button class="m-cancel" onclick="openAdminSettings(${clientId},${staffIdx})">← Back</button>
    </div>`);
}

function toggleNoteHistoryVisibility(clientId,staffIdx,noteIdx){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  const note=staffArr[staffIdx].notesLog[noteIdx];
  if(!note)return;
  note.hideHistory=!note.hideHistory;
  c.info.staff=JSON.stringify(staffArr);
  save();
  openNoteHistoryManager(clientId,staffIdx);
}

function doSaveNoteEdit(){
  const{clientId,staffIdx,noteIdx,newText}=window._pendingNoteEdit||{};
  window._pendingNoteEdit=null;
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const staffArr=getStaffArr(c);
  if(!staffArr[staffIdx]||!staffArr[staffIdx].notesLog[noteIdx])return;

  if(!orig.originalDate) orig.originalDate=orig.date;
  orig.editedAt=fmtDate();
  orig.text=newText;
  orig.edited=true;

  save();
  openStaffProfile(clientId,staffIdx);

function renderStaffEditor(staffArr){

  return`<div style="border:0.5px solid var(--border-mid);border-radius:var(--radius-md);overflow:hidden;margin-bottom:8px;">
    <div style="display:grid;grid-template-columns:18px 1fr 1fr 1fr 1fr 28px;gap:0;background:var(--bg-tertiary);border-bottom:0.5px solid var(--border-mid);padding:5px 8px;">

      <div style="font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;padding:0 4px;">Title / Role</div>
      <div style="font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;padding:0 4px;">Phone</div>
      <div style="font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;padding:0 4px;">Email</div>

    </div>

    <div class="staff-row" id="sr-${i}" draggable="true" data-idx="${i}" style="display:grid;grid-template-columns:18px 1fr 1fr 1fr 1fr 28px;gap:0;align-items:center;padding:4px 8px;border-bottom:0.5px solid var(--border-light);background:var(--bg-primary);">
      <span class="staff-handle" style="cursor:grab;color:var(--text-tertiary);font-size:14px;user-select:none;line-height:1;">⠿</span>
      <input id="sn-${i}" value="${esc(m.name||'')}" placeholder="Name" style="height:28px;padding:0 6px;border:0.5px solid transparent;border-radius:4px;background:transparent;color:var(--text-primary);font-size:12px;font-weight:500;font-family:var(--font);width:100%;"/>
      <input id="st-${i}" value="${esc(m.title||'')}" placeholder="—" style="height:28px;padding:0 6px;border:0.5px solid transparent;border-radius:4px;background:transparent;color:var(--text-primary);font-size:12px;font-family:var(--font);width:100%;"/>
      <input id="sp-${i}" value="${esc(m.phone||'')}" placeholder="—" style="height:28px;padding:0 6px;border:0.5px solid transparent;border-radius:4px;background:transparent;color:var(--text-primary);font-size:12px;font-family:var(--font);width:100%;"/>
      <input id="se-${i}" value="${esc(m.email||'')}" placeholder="—" style="height:28px;padding:0 6px;border:0.5px solid transparent;border-radius:4px;background:transparent;color:var(--text-primary);font-size:12px;font-family:var(--font);width:100%;"/>
      <button class="icon-btn" style="color:var(--text-tertiary);font-size:14px;justify-self:center;" onclick="removeStaffMember(${i})">×</button>
    </div>`).join('')}
  </div>`;
}

function initStaffDragSort(){
  const editor=document.getElementById('staff-editor');
  if(!editor)return;
  let dragEl=null,dragOver=null;
  editor.querySelectorAll('.staff-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      if(!e.target.classList.contains('staff-handle')){e.preventDefault();return;}
      dragEl=row;
      setTimeout(()=>row.style.opacity='0.4',0);
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      editor.querySelectorAll('.staff-row').forEach(r=>{r.style.opacity='1';r.style.outline='';});
      if(dragEl&&dragOver&&dragEl!==dragOver){
        const staff=readStaffFromDOM();
        const from=parseInt(dragEl.dataset.idx);
        const to=parseInt(dragOver.dataset.idx);
        const moved=staff.splice(from,1)[0];
        staff.splice(to,0,moved);
        document.getElementById('staff-editor').innerHTML=renderStaffEditor(staff);
        rebindStaffIndices();
        initStaffDragSort();
      }
      dragEl=null;dragOver=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(row!==dragEl){
        dragOver=row;
        editor.querySelectorAll('.staff-row').forEach(r=>r.style.outline='');
        row.style.outline='2px solid var(--border-strong)';
      }
    });
  });
}

function readStaffFromDOM(){
  const rows=document.querySelectorAll('.staff-row');
  const result=[];
  rows.forEach((r,i)=>{
    const n=(document.getElementById('sn-'+i)||{}).value||'';
    const t=(document.getElementById('st-'+i)||{}).value||'';
    const p=(document.getElementById('sp-'+i)||{}).value||'';
    const e=(document.getElementById('se-'+i)||{}).value||'';
    if(n.trim()||t.trim()||p.trim()||e.trim()) result.push({name:n.trim(),title:t.trim(),phone:p.trim(),email:e.trim()});
  });
  return result;
}

function addStaffMember(){
  const current=readStaffFromDOM();
  current.push({name:'',title:'',phone:'',email:''});
  document.getElementById('staff-editor').innerHTML=renderStaffEditor(current);
  rebindStaffIndices();
  initStaffDragSort();
}

function removeStaffMember(idx){
  const row=document.getElementById('sr-'+idx);
  if(!row)return;
  const nameEl=document.getElementById('sn-'+idx);
  const name=nameEl&&nameEl.value.trim()?nameEl.value.trim():'this team member';
  const orig=row.innerHTML;
  const origStyle=row.style.cssText;
  row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:0.5px solid var(--border-light);background:var(--bg-secondary);';
  row.innerHTML=`<span style="flex:1;font-size:12px;color:var(--text-primary);">Remove <strong>${esc(name)}</strong>?</span>
    <button type="button" style="height:24px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);font-size:11px;cursor:pointer;font-family:var(--font);" onclick="cancelRemoveStaff(${idx})">Cancel</button>
    <button type="button" style="height:24px;padding:0 10px;border:none;border-radius:4px;background:#A32D2D;color:#fff;font-size:11px;cursor:pointer;font-family:var(--font);" onclick="doRemoveStaffMember(${idx})">Remove</button>`;
  row._origHtml=orig;
  row._origStyle=origStyle;
}

function cancelRemoveStaff(idx){
  const row=document.getElementById('sr-'+idx);
  if(row&&row._origHtml){row.innerHTML=row._origHtml;row.style.cssText=row._origStyle;}
}

function doRemoveStaffMember(idx){
  const current=readStaffFromDOM();
  // If called from inline (with idx), remove that index; otherwise fall back to pending
  if(idx!==undefined){
    current.splice(idx,1);
  } else {
    const{idx:pi}=window._pendingStaffRemove||{};
    window._pendingStaffRemove=null;
    if(pi===undefined)return;
    current.splice(pi,1);
  }
  document.getElementById('staff-editor').innerHTML=renderStaffEditor(current);
  rebindStaffIndices();
  initStaffDragSort();
}

function saveClientModal(id){
  const name=val('m-name').trim();
  if(!name){alert('Client name is required.');return;}
  const fields=getClientFields(id);
  const info={};
  fields.forEach(f=>{
    if(f.key==='staff'){
      info.staff=JSON.stringify(readStaffFromDOM());
    } else {
      const el=document.getElementById('mf-'+f.key);
      if(el)info[f.key]=(el.value||'').trim();
    }
  });
  const practices=[];
  const practiceColors={};
  let i=0;
  while(document.getElementById('prac-row-'+i)){
    const nameEl=document.getElementById('prac-'+i);
    const bgEl=document.getElementById('prac-color-bg-'+i);
    const txtEl=document.getElementById('prac-color-txt-'+i);
    const name=nameEl?nameEl.value.trim():'';
    if(name){
      practices.push(name);
      if(bgEl&&txtEl) practiceColors[name]={bg:bgEl.value,txt:txtEl.value};
    }
    i++;
  }
  const billingContacts=readBillingContactsFromDOM();
  if(id){
    const c=S.clients.find(x=>x.id===id);
    c.name=name;c.info=info;
    c.practices=practices.length>1?practices:null;
    c.practiceColors=practiceColors;
    c.billingContacts=billingContacts;
  } else {
    S.clients.push({id:S.nCid++,name,ci:S.clients.length%COLORS.length,info,practices:practices.length>1?practices:null,practiceColors,billingContacts});
  }
  save();closeModal();render();
}

function getClientFields(clientId){
  const base=S.fields||DEFAULT_FIELDS;
  if(!clientId||clientId==='null') return base;
  const c=S.clients.find(x=>x.id===clientId||x.id===parseInt(clientId));
  if(!c||!c.fields) return base;
  const existing=c.fields;
  const existingKeys=existing.map(f=>f.key);
  const missing=DEFAULT_FIELDS.filter(f=>!existingKeys.includes(f.key));
  return missing.length?[...existing,...missing]:existing;
}
