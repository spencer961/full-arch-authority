function openAdvancedFields(clientId){
  const fields=getClientFields(clientId);
  const cid=clientId==='null'||clientId===null?null:parseInt(clientId);
  const c=cid!==null?clients.find(x=>x.id===cid):null;
  const existingUrl=c?.info?.backupSheetUrl||'';
  const rows=fields.map((f,i)=>`
    <div class="af-row" draggable="true" data-idx="${i}" style="display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:default;">
      <span class="af-handle" style="cursor:grab;color:var(--text-tertiary);font-size:16px;padding:0 2px;user-select:none;line-height:1;">⠿</span>
      <input value="${esc(f.label)}" placeholder="Field name" style="flex:1;min-width:0;height:32px;padding:0 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);" id="af-label-${i}"/>
      <select style="width:90px;flex-shrink:0;height:32px;padding:0 4px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-secondary);font-size:11px;font-family:var(--font);" id="af-type-${i}">
        <option value="text"${f.type==='text'?' selected':''}>Text</option>
        <option value="textarea"${f.type==='textarea'?' selected':''}>Textarea</option>
        <option value="timezone"${f.type==='timezone'?' selected':''}>Timezone</option>
      </select>
      <button class="icon-btn" style="color:#A32D2D;font-size:16px;flex-shrink:0;" onclick="removeAdvancedField(${i},${clientId})">×</button>
    </div>`).join('');
  showModal(`
    <h3>Advanced settings</h3>
    <p style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px;">Drag ⠿ to reorder. Editing fields for this client only. Use "Apply to all" to push to every client.</p>
    <div id="af-rows">${rows}</div>
    <button onclick="addAdvancedField(${clientId})" style="display:flex;align-items:center;gap:5px;padding:6px 10px;border:0.5px dashed var(--border-mid);border-radius:var(--radius-md);color:var(--text-tertiary);font-size:12px;cursor:pointer;background:none;font-family:var(--font);margin-bottom:12px;width:100%;"><span style="font-size:15px;">+</span> Add field</button>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button onclick="resetFieldOrder(${clientId})" style="flex:1;height:32px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;font-family:var(--font);">Reset order</button>
      <button onclick="confirmResetFields(${clientId})" style="flex:1;height:32px;padding:0 10px;border:0.5px solid rgba(163,45,45,0.3);border-radius:var(--radius-md);background:transparent;color:#A32D2D;font-size:12px;cursor:pointer;font-family:var(--font);">Reset fields</button>
    </div>
    <div style="border-top:0.5px solid var(--border-light);padding-top:10px;margin-bottom:10px;">
      <div style="font-size:10px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Redundancy</div>
      <input id="af-sheet-url" type="url" value="${existingUrl}" placeholder="Google Sheet backup URL (paste Web App URL here)"
        style="width:100%;height:32px;padding:0 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-secondary);font-size:12px;font-family:var(--font);"/>
    </div>
    <div style="border-top:0.5px solid var(--border-light);padding-top:10px;display:flex;gap:6px;">
      <button class="m-cancel" style="flex:1;" onclick="openClientModal(${clientId==='null'?'null':clientId})">← Back</button>
      <button onclick="saveAdvancedFields(${clientId},false)" style="flex:1;height:34px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);">Save for this client</button>
      <button onclick="confirmApplyAll(${clientId})" style="flex:1;height:34px;padding:0 10px;border:none;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);">Apply to all</button>
    </div>`);
  initDragSort(clientId);
}

function initDragSort(clientId){
  const container=document.getElementById('af-rows');
  if(!container)return;
  let dragEl=null,dragOver=null;
  container.querySelectorAll('.af-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{
      dragEl=row;
      setTimeout(()=>row.style.opacity='0.4',0);
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      row.style.opacity='1';
      container.querySelectorAll('.af-row').forEach(r=>r.style.borderTop='');
      if(dragEl&&dragOver&&dragEl!==dragOver){
        const fields=readAdvancedFieldsFromDOM(clientId);
        const fromIdx=parseInt(dragEl.dataset.idx);
        const toIdx=parseInt(dragOver.dataset.idx);
        const moved=fields.splice(fromIdx,1)[0];
        fields.splice(toIdx,0,moved);
        setClientFieldsTemp(clientId,fields);
        openAdvancedFields(clientId);
      }
      dragEl=null;dragOver=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(row!==dragEl){
        dragOver=row;
        container.querySelectorAll('.af-row').forEach(r=>r.style.borderTop='');
        row.style.borderTop='2px solid var(--border-strong)';
      }
    });
  });
}

function confirmApplyAll(clientId){
  showModal(`
    <h3>Apply to all clients?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will overwrite the field structure for every client with these settings. Individual client data is preserved where field keys match.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
      <button class="m-save" onclick="saveAdvancedFields(${clientId},true)">Apply to all</button>
    </div>`);
}

function resetFieldOrder(clientId){
  const current=readAdvancedFieldsFromDOM(clientId);
  const defaultKeys=DEFAULT_FIELDS.map(f=>f.key);
  const defaultFields=DEFAULT_FIELDS.map(dk=>{
    const existing=current.find(f=>f.key===dk.key);
    return existing||dk;
  });
  const extras=current.filter(f=>!defaultKeys.includes(f.key));
  const reordered=[...defaultFields,...extras];
  setClientFieldsTemp(clientId,reordered);
  openAdvancedFields(clientId);
}

function confirmResetFields(clientId){
  showModal(`
    <h3>Reset fields?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will restore the original field names and order for this client. Custom fields will be removed. Saved data is not affected.</p>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
      <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="doResetFields(${clientId})">Reset</button>
    </div>`);
}

function doResetFields(clientId){
  setClientFieldsTemp(clientId,JSON.parse(JSON.stringify(DEFAULT_FIELDS)));
  openAdvancedFields(clientId);
}

function setClientFieldsTemp(clientId,fields){
  if(!clientId||clientId==='null'){S.fields=fields;return;}
  const c=S.clients.find(x=>x.id===parseInt(clientId));
  if(c) c.fields=fields;
}

function addAdvancedField(clientId){
  const container=document.getElementById('af-rows');
  if(!container)return;
  const i=container.querySelectorAll('.af-row').length;
  const div=document.createElement('div');
  div.className='af-row';
  div.draggable=true;
  div.dataset.idx=i;
  div.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:default;';
  div.innerHTML=`<span class="af-handle" style="cursor:grab;color:var(--text-tertiary);font-size:16px;padding:0 2px;user-select:none;line-height:1;">⠿</span>
    <input value="" placeholder="Field name" style="flex:1;min-width:0;height:32px;padding:0 8px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);" id="af-label-${i}"/>
    <select style="width:90px;flex-shrink:0;height:32px;padding:0 4px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-secondary);font-size:11px;font-family:var(--font);" id="af-type-${i}">
      <option value="text" selected>Text</option>
      <option value="textarea">Textarea</option>
      <option value="timezone">Timezone</option>
    </select>
    <button class="icon-btn" style="color:#A32D2D;font-size:16px;flex-shrink:0;" onclick="removeAdvancedField(${i},${clientId})">×</button>`;
  container.appendChild(div);
  initDragSort(clientId);
  // Focus the new label input
  setTimeout(()=>{const el=document.getElementById('af-label-'+i);if(el)el.focus();},50);
}

function removeAdvancedField(idx,clientId){
  const fields=readAdvancedFieldsFromDOM(clientId);
  const field=fields[idx];
  const label=field&&field.label?field.label:'this field';
  const key=field&&field.key?field.key:'';
  const isDefault=DEFAULT_FIELDS.some(f=>f.key===key);
  const isNotes=key==='notes';

  if(isNotes){
    showModal(`
      <h3>Cannot delete Notes</h3>
      <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:8px;">The Notes field is protected and cannot be removed.</p>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="m-save" onclick="openAdvancedFields(${clientId})">OK</button>
      </div>`);
    return;
  }

  if(isDefault){
    // Need admin password first
    showModal(`
      <h3>Delete default field?</h3>
      <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:8px;"><strong>${esc(label)}</strong> is a default field. Enter the admin password to delete it.</p>
      <div class="fgroup" style="margin-top:12px;">
        <input id="af-del-pw" type="password" placeholder="Admin password" style="height:36px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;font-family:var(--font);width:100%;"/>
      </div>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
        <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="confirmDefaultFieldDelete(${idx},'${esc(key)}','${esc(label)}',${clientId})">Continue</button>
      </div>`);
    setTimeout(()=>{const el=document.getElementById('af-del-pw');if(el)el.focus();},50);
    return;
  }

  // Custom field — show delete options
  window._pendingFieldRemove={idx,clientId,key,label};
  showModal(`
    <h3>Delete field?</h3>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:8px;">Remove <strong>${esc(label)}</strong>?</p>
    <div class="modal-actions" style="margin-top:12px;flex-direction:column;gap:8px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})" style="width:100%;">Cancel</button>
      <button onclick="doRemoveAdvancedField(false)" style="width:100%;height:34px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);">Delete for this client only</button>
      <button onclick="doRemoveAdvancedField(true)" style="width:100%;height:34px;border:none;border-radius:var(--radius-md);background:#A32D2D;color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);">Delete for all clients</button>
    </div>`);
}

function confirmDefaultFieldDelete(idx,key,label,clientId){
  const pw=(document.getElementById('af-del-pw')||{}).value||'';
  if(pw!=='harrypotter'){
    showModal(`
      <h3>Incorrect password</h3>
      <p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">That password is incorrect.</p>
      <div class="modal-actions" style="margin-top:12px;">
        <button class="m-save" onclick="openAdvancedFields(${clientId})">OK</button>
      </div>`);
    return;
  }
  window._pendingFieldRemove={idx,clientId,key,label};
  showModal(`
    <h3>Delete default field?</h3>
    <div style="padding:10px 12px;background:#FCEBEB;border-radius:var(--radius-md);margin:10px 0;border:0.5px solid rgba(163,45,45,0.2);">
      <p style="font-size:13px;color:#A32D2D;line-height:1.6;">Deleting <strong>${esc(label)}</strong> will remove it and all its data permanently.</p>
    </div>
    <div class="modal-actions" style="margin-top:12px;flex-direction:column;gap:8px;">
      <button class="m-cancel" onclick="openAdvancedFields(${clientId})" style="width:100%;">Cancel</button>
      <button onclick="doRemoveAdvancedField(false)" style="width:100%;height:34px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;font-family:var(--font);">Delete for this client only</button>
      <button onclick="doRemoveAdvancedField(true)" style="width:100%;height:34px;border:none;border-radius:var(--radius-md);background:#A32D2D;color:#fff;font-size:13px;cursor:pointer;font-family:var(--font);">Delete for all clients</button>
    </div>`);
}

function doRemoveAdvancedField(forAll){
  const{idx,clientId,key,label}=window._pendingFieldRemove||{};
  window._pendingFieldRemove=null;
  if(forAll){
    // Check how many clients actually have this field
    const clientsWithField=S.clients.filter(c=>{
      const fields=Array.isArray(c.fields)?c.fields:(S.fields||DEFAULT_FIELDS);
      return fields.some(f=>f.key===key);
    });
    const missingCount=S.clients.length-clientsWithField.length;
    if(missingCount>0&&clientsWithField.length===1&&clientsWithField[0].id===clientId){
      // Field only exists on this client
      showModal(`
        <h3>Field not shared</h3>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:8px;"><strong>${esc(label||'This field')}</strong> only exists for this client — it hasn't been applied to any others.</p>
        <div class="modal-actions" style="margin-top:12px;">
          <button class="m-cancel" onclick="openAdvancedFields(${clientId})">Cancel</button>
          <button class="m-danger" style="border:none;background:#A32D2D;color:#fff;height:34px;padding:0 16px;border-radius:var(--radius-md);font-size:13px;cursor:pointer;" onclick="_doDeleteThisClientField(${clientId},'${esc(key)}')">Delete for this client</button>
        </div>`);
      window._pendingFieldRemove={idx,clientId,key,label};
      return;
    }
    // Remove from global fields and all clients
    if(Array.isArray(S.fields)) S.fields=S.fields.filter(f=>f.key!==key);
    S.clients.forEach(c=>{
      if(Array.isArray(c.fields)) c.fields=c.fields.filter(f=>f.key!==key);
      if(c.info) delete c.info[key];
    });
    save();openAdvancedFields(clientId);
    showToast(`"${label||'Field'}" removed from all clients`);
  } else {
    const fields=readAdvancedFieldsFromDOM(clientId);
    fields.splice(idx,1);
    setClientFieldsTemp(clientId,fields);
    save();openAdvancedFields(clientId);
  }
}

function _doDeleteThisClientField(clientId,key){
  const{idx}=window._pendingFieldRemove||{};
  window._pendingFieldRemove=null;
  const fields=readAdvancedFieldsFromDOM(clientId);
  const i=fields.findIndex(f=>f.key===key);
  if(i>-1) fields.splice(i,1);
  else if(idx!==undefined) fields.splice(idx,1);
  setClientFieldsTemp(clientId,fields);
  save();openAdvancedFields(clientId);
}

function readAdvancedFieldsFromDOM(clientId){
  const existing=getClientFields(clientId);
  const rows=document.querySelectorAll('#af-rows .af-row');
  return [...rows].map((row,i)=>{
    const labelEl=document.getElementById('af-label-'+i);
    const typeEl=document.getElementById('af-type-'+i);
    const orig=existing[i]||{};
    const label=(labelEl?labelEl.value.trim():'')||orig.label||'New field';
    const key=orig.key||(label?'custom_'+label.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_')+'_'+i:'custom_'+i);
    return{
      key,
      label,
      type:typeEl?typeEl.value:(orig.type||'text'),
      placeholder:orig.placeholder||''
    };
  });
}

function saveAdvancedFields(clientId,applyAll){
  const fields=readAdvancedFieldsFromDOM(clientId);
  const validFields=fields.filter(f=>f.label&&f.label.trim()&&f.label!=='New field'||DEFAULT_FIELDS.some(d=>d.key===f.key));
  // Save backup sheet URL into client info (silently)
  const urlEl=document.getElementById('af-sheet-url');
  if(urlEl&&clientId!=='null'&&clientId!==null){
    const cid=parseInt(clientId);
    const c=S.clients.find(x=>x.id===cid);
    if(c){
      if(!c.info) c.info={};
      c.info.backupSheetUrl=urlEl.value.trim();
    }
  }
  if(applyAll){
    S.fields=validFields;
    S.clients.forEach(c=>{c.fields=JSON.parse(JSON.stringify(validFields));});
  } else {
    setClientFieldsTemp(clientId,validFields);
  }
  save();
  render();
  openClientModal(clientId==='null'?null:parseInt(clientId));
}

function getPractices(c){
  if(!c) return [];
  const saved=Array.isArray(c.practices)&&c.practices.length?c.practices:null;
  return saved||[c.name];
}

function toggleSwitch(id){
  const el=document.getElementById(id);
  if(!el)return;
  const on=el.dataset.on==='1';
  el.dataset.on=on?'0':'1';
  el.style.background=on?'var(--border-mid)':'#4ade80';
  el.querySelector('span').style.transform=on?'translateX(0)':'translateX(16px)';
}

function switchVal(id){return document.getElementById(id)?.dataset.on==='1';}

function makeSwitchHtml(id,on,label){
  const bg=on?'#4ade80':'var(--border-mid)';
  const tx=on?'translateX(16px)':'translateX(0)';
  return`<div style="display:flex;align-items:center;gap:10px;">
    <button type="button" id="${id}" data-on="${on?'1':'0'}" onclick="toggleSwitch('${id}')" style="width:36px;height:20px;border-radius:10px;background:${bg};border:none;cursor:pointer;padding:2px;display:flex;align-items:center;transition:background .2s;position:relative;flex-shrink:0;">
      <span style="width:16px;height:16px;border-radius:50%;background:#fff;display:block;transition:transform .2s;transform:${tx};"></span>
    </button>
    <span style="font-size:12px;color:var(--text-secondary);">${label}</span>
  </div>`;
}

function openLinkModal(linkId,prefClientId){
  const l=linkId?S.links.find(x=>x.id===linkId):null;
  const existingCats=[...new Set(S.links.map(x=>x.category))].sort();
  const defClient=l?l.clientId:prefClientId||(S.clients[0]?S.clients[0].id:null);
  const clientOpts=S.clients.map(c=>`<option value="${c.id}"${defClient===c.id?' selected':''}>${esc(c.name)}</option>`).join('');
  const catOpts=existingCats.map(c=>`<option value="${esc(c)}">`).join('');
  const selClient=S.clients.find(c=>c.id===defClient)||S.clients[0];
  const practices=selClient?getPractices(selClient):[];
  const practiceRow=practices.length>1?`
    <div class="fgroup"><div class="flabel">Practice</div>
      <select id="m-practice">
        <option value="">— All practices (shared)</option>
        ${practices.map(p=>`<option value="${esc(p)}"${(l&&l.practice===p)?' selected':''}>${esc(p)}</option>`).join('')}
      </select>
    </div>`:'<input type="hidden" id="m-practice" value=""/>';

  const cat=l?l.category:'';
  const globalHidden=cat&&Array.isArray(S.hiddenCategories)&&S.hiddenCategories.includes(cat);
  const clientHidden=cat&&selClient&&selClient.categoryOverrides&&selClient.categoryOverrides[cat]==='hidden';
  const clientShown=cat&&selClient&&selClient.categoryOverrides&&selClient.categoryOverrides[cat]==='show';
  const globalVisible=!globalHidden;
  const clientVisible=globalHidden?clientShown:!clientHidden;

  const visibilitySection=`
    <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);padding:10px 12px;background:var(--bg-secondary);display:flex;flex-direction:column;gap:10px;">
      <div style="font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;">Client mode visibility</div>
      ${makeSwitchHtml('m-global-vis',globalVisible,'Show for all clients')}
      ${makeSwitchHtml('m-client-vis',clientVisible,'Show for this client')}
    </div>`;

  const addToAllRow=!l?`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;">
      <input type="checkbox" id="m-add-all" style="width:14px;height:14px;cursor:pointer;accent-color:var(--accent);"/>
      <label for="m-add-all" style="font-size:12px;color:var(--text-secondary);cursor:pointer;">Add this category to all clients (empty URL)</label>
    </div>`:'';

  showModal(`
    <h3>${l?'Edit file':'Add spreadsheet link'}</h3>
    <div class="fgroup"><div class="flabel">Client</div><select id="m-client" onchange="refreshPracticeDropdown()">${clientOpts}</select></div>
    <div id="practice-row">${practiceRow}</div>
    <div class="fgroup"><div class="flabel">Category</div>
      <input id="m-cat" list="cat-dl" value="${esc(cat)}" placeholder="e.g. Media Plan, Budget, Tracker" oninput="refreshVisibilityToggles()"/>
      <datalist id="cat-dl">${catOpts}</datalist>
    </div>
    <div class="fgroup"><div class="flabel">Button label (optional — defaults to category name)</div>
      <input id="m-label" value="${esc(l?l.label:'')}" placeholder="Leave blank to use category name"/>
    </div>
    <div class="fgroup"><div class="flabel">Spreadsheet URL</div>
      <input id="m-url" value="${esc(l?l.url:'')}" placeholder="https://docs.google.com/spreadsheets/..."/>
    </div>
    ${visibilitySection}
    ${addToAllRow}
    <div class="modal-actions">
      ${l?`<button class="m-danger" onclick="confirmDeleteLink(${l.id})">Delete file</button>`:''}
      ${l?`<button class="m-danger" style="margin-left:0;" onclick="confirmDeleteCategoryAllClients('${esc(l.category)}')">Delete category for all clients</button>`:''}
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="saveLinkModal(${linkId||'null'})">Save</button>
    </div>`);
}

function refreshVisibilityToggles(){
  const cat=val('m-cat').trim();
  if(!cat)return;
  const globalHidden=Array.isArray(S.hiddenCategories)&&S.hiddenCategories.includes(cat);
  const cid=parseInt(val('m-client'));
  const c=S.clients.find(x=>x.id===cid);
  const clientShown=c&&c.categoryOverrides&&c.categoryOverrides[cat]==='show';
  const clientHidden=c&&c.categoryOverrides&&c.categoryOverrides[cat]==='hidden';
  const gv=document.getElementById('m-global-vis');
  const cv=document.getElementById('m-client-vis');

function saveLinkModal(id){
  const cid=parseInt(val('m-client'));
  const cat=val('m-cat').trim();
  const lbl=val('m-label').trim()||cat;
  const url=val('m-url').trim();
  const practice=val('m-practice').trim()||null;
  if(!cat){alert('Category is required.');return;}

  // Save global visibility
  if(!Array.isArray(S.hiddenCategories)) S.hiddenCategories=[];
  const globalVisible=switchVal('m-global-vis');
  if(globalVisible) S.hiddenCategories=S.hiddenCategories.filter(c=>c!==cat);
  else if(!S.hiddenCategories.includes(cat)) S.hiddenCategories.push(cat);

  // Save per-client override
  const c=S.clients.find(x=>x.id===cid);
  if(c){
    if(!c.categoryOverrides) c.categoryOverrides={};
    const clientVisible=switchVal('m-client-vis');
    const globalHidden=S.hiddenCategories.includes(cat);
    if(globalHidden&&clientVisible) c.categoryOverrides[cat]='show';
    else if(!globalHidden&&!clientVisible) c.categoryOverrides[cat]='hidden';
    else delete c.categoryOverrides[cat];
  }

  // Add to all clients if checked — skip current client since we save it below
  const addAll=document.getElementById('m-add-all');
  if(addAll&&addAll.checked){
    S.clients.forEach(cl=>{
      if(cl.id===cid) return; // skip current client
      const already=S.links.some(lk=>lk.clientId===cl.id&&lk.category===cat);
      if(!already) S.links.push({id:S.nLid++,clientId:cl.id,label:lbl,category:cat,url:'',practice:null});
    });
  }

  if(id){const l=S.links.find(x=>x.id===id);l.clientId=cid;l.category=cat;l.label=lbl;l.url=url;l.practice=practice;}
  else{S.links.push({id:S.nLid++,clientId:cid,label:lbl,category:cat,url,practice});}
  save();closeModal();render();
}

function inlineConfirm(el,label,onConfirm){
  const orig=el.innerHTML;
  const origStyle=el.style.cssText;
  el.style.cssText='display:flex;align-items:center;gap:6px;padding:4px 8px;background:var(--bg-secondary);border-radius:var(--radius-md);';
  el.innerHTML=`<span style="flex:1;font-size:11px;color:var(--text-primary);">Remove <strong>${esc(label)}</strong>?</span>
    <button type="button" style="height:22px;padding:0 8px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);font-size:11px;cursor:pointer;font-family:var(--font);">Cancel</button>
    <button type="button" style="height:22px;padding:0 8px;border:none;border-radius:4px;background:#A32D2D;color:#fff;font-size:11px;cursor:pointer;font-family:var(--font);">Remove</button>`;
  el.setAttribute('data-ic','1');

  // Block the chip's own click but allow button clicks through
  const blockClick=e=>{
    if(e.target.closest('button')) return;
    e.stopPropagation();e.preventDefault();
  };
  el.addEventListener('click',blockClick,true);
  const unblock=()=>setTimeout(()=>el.removeEventListener('click',blockClick,true),300);

  const btns=el.querySelectorAll('button');
  btns[0].addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();});
  btns[0].addEventListener('click',e=>{
    e.stopPropagation();e.preventDefault();
    el.innerHTML=orig;el.style.cssText=origStyle;el.removeAttribute('data-ic');
    unblock();
  });
  btns[1].addEventListener('mousedown',e=>{e.stopPropagation();e.preventDefault();});
  btns[1].addEventListener('click',e=>{
    e.stopPropagation();e.preventDefault();
    unblock();
    onConfirm();
  });
  el._cancelIc=()=>{el.innerHTML=orig;el.style.cssText=origStyle;el.removeAttribute('data-ic');unblock();};
  el._confirmIc=onConfirm;
}

function importBackup(input){

  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.clients||!Array.isArray(parsed.clients)) throw new Error('Invalid backup file — missing clients.');
      window._pendingImport=parsed;
      showModal(`

        <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-top:4px;">This will replace all current data with the contents of <strong>${esc(file.name)}</strong>. This cannot be undone.</p>

    }
  };
  reader.readAsText(file);
  input.value='';
}

function debugRecoverData(){
  const keys=Object.keys(localStorage);
  const gmjKeys=keys.filter(k=>k.includes('gmj')||k.includes('dashboard')||k.includes('csd'));
  let found='Keys in localStorage:\n'+keys.join('\n')+'\n\nGMJ-related:\n';
  gmjKeys.forEach(k=>{
    try{
      const v=JSON.parse(localStorage.getItem(k));
      found+=`\n${k}: ${v.clients?v.clients.length+' clients':''} ${v.links?v.links.length+' links':''}`;
      if(v.clients){
        v.clients.forEach(c=>{
          let staffArr=[];
          try{staffArr=JSON.parse((c.info&&c.info.staff)||'[]');}catch(e){}
          const noteCount=staffArr.reduce((acc,s)=>acc+(s.notesLog?s.notesLog.length:0),0);
          found+=`\n  ${c.name}: ${noteCount} notes`;
        });
      }
    }catch(e){found+=`\n${k}: (parse error)`;}
  });
  showModal(`<h3>Data Recovery</h3><pre style="font-size:11px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto;background:var(--bg-secondary);padding:10px;border-radius:var(--radius-md);margin-top:8px;">${found}</pre><div class="modal-actions"><button class="m-cancel" onclick="closeModal()">Close</button><button class="m-save" onclick="tryRestoreFromAllKeys()">Try restore</button></div>`);
}

function tryRestoreFromAllKeys(){
  const keys=Object.keys(localStorage);
  let best=null,bestScore=0;
  keys.forEach(k=>{
    try{
      const v=JSON.parse(localStorage.getItem(k));
      if(v&&Array.isArray(v.clients)){
        let score=v.clients.length;
        v.clients.forEach(c=>{
          let staffArr=[];
          try{staffArr=JSON.parse((c.info&&c.info.staff)||'[]');}catch(e){}
          score+=staffArr.reduce((acc,s)=>acc+(s.notesLog?s.notesLog.length:0),0)*10;
        });
        if(score>bestScore){bestScore=score;best={key:k,data:v};}
      }
    }catch(e){}
  });
  if(best){
    showModal(`<h3>Found candidate</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;line-height:1.6;">Key: <strong>${best.key}</strong><br>${best.data.clients.length} clients found. Restore this data?</p><div class="modal-actions"><button class="m-cancel" onclick="closeModal()">Cancel</button><button class="m-save" onclick="doRestoreKey('${best.key}')">Restore</button></div>`);
  } else {
    showModal(`<h3>Nothing found</h3><p style="font-size:13px;color:var(--text-secondary);margin-top:8px;">No recoverable data found in localStorage.</p><div class="modal-actions"><button class="m-save" onclick="closeModal()">OK</button></div>`);
  }
}

  saveBulkPayments(clientId);
}

function removeBulkPayment(idx){
  window._bulkPayments.splice(idx,1);
  refreshBulkList();
}

function refreshBulkList(){
  const list=document.getElementById('bulk-list');
  const totalEl=document.getElementById('bulk-total');
  const saveBtn=document.getElementById('bulk-save-btn');
  if(!list||!window._bulkPayments.length){
    if(list) list.style.display='none';
    if(totalEl) totalEl.style.display='none';
    if(saveBtn) saveBtn.style.display='none';
    return;
  }
  list.style.display='flex';
  totalEl.style.display='block';
  saveBtn.style.display='inline-flex';
  const total=window._bulkPayments.reduce((s,p)=>s+Number(p.amount),0);
  list.innerHTML=window._bulkPayments.map((p,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:0.5px solid var(--border-light);background:var(--bg-primary);">
      <div style="flex:1;">
        <span style="font-size:13px;font-weight:500;color:var(--text-primary);">$${Number(p.amount).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
        <span style="font-size:11px;color:var(--text-tertiary);margin-left:8px;">${esc(p.fmt)}${p.note?` · ${esc(p.note)}`:''}</span>
      </div>
      <button onclick="removeBulkPayment(${i})" style="font-size:11px;padding:2px 8px;border:0.5px solid rgba(163,45,45,0.3);border-radius:4px;background:transparent;color:#A32D2D;cursor:pointer;font-family:var(--font);">Remove</button>
    </div>`).join('');
  totalEl.textContent=`${window._bulkPayments.length} payment${window._bulkPayments.length!==1?'s':''} queued · Total: $${total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}

function saveBulkPayments(clientId){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c||!window._bulkPayments.length)return;
  if(!Array.isArray(c.payments)) c.payments=[];
  window._bulkPayments.forEach(p=>c.payments.push({...p,recorded:new Date().toISOString()}));
  const count=window._bulkPayments.length;
  window._bulkPayments=[];
  save();closeModal();render();
  showToast(`${count} payment${count!==1?'s':''} recorded`);
}

function confirmMarkPaid(clientId){
  addBulkPaymentAndSave(clientId);
}

function doMarkPaid(){
  const{clientId,amount,date,fmt,note}=window._pendingPayment||{};
  window._pendingPayment=null;
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  if(!Array.isArray(c.payments)) c.payments=[];
  c.payments.push({id:Date.now(),amount,date,fmt,note,recorded:new Date().toISOString()});
  save();closeModal();render();
  showToast('Payment recorded');
}

function openPaymentHistory(clientId){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c)return;
  const payments=Array.isArray(c.payments)?[...c.payments].reverse():[];
  const total=payments.reduce((sum,p)=>sum+Number(p.amount),0);

  const years=[...new Set(payments.map(p=>p.date.slice(0,4)))].sort().reverse();
  const months=['All','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const rows=payments.length?payments.map((p,i)=>`
    <div id="pay-row-${p.id}" style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:0.5px solid var(--border-light);background:var(--bg-primary);">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;color:var(--text-primary);">$${Number(p.amount).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">${esc(p.fmt||p.date)}${p.note?` · ${esc(p.note)}`:''}</div>
      </div>
      <button onclick="openEditPayment(${clientId},${p.id})" style="font-size:11px;padding:2px 8px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);">Edit</button>
      <button onclick="inlineDeletePayment(${clientId},${p.id},this)" style="font-size:11px;padding:2px 8px;border:0.5px solid rgba(163,45,45,0.3);border-radius:4px;background:transparent;color:#A32D2D;cursor:pointer;font-family:var(--font);">Delete</button>
    </div>`).join('')
    :'<div style="padding:16px;font-size:13px;color:var(--text-tertiary);font-style:italic;text-align:center;">No payments recorded yet.</div>';

  showModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="flex:1;">
        <h3>${esc(c.name)}</h3>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px;">Payment history</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        ${payments.length>1?`<span class="hidden-icon-wrap" onmouseenter="showHiddenTooltip(event,'Payments over time graph')" onmouseleave="hideHiddenTooltip()"><button onclick="togglePaymentChart()" id="chart-toggle-btn" style="background:none;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </button></span>`:''}
        <div style="text-align:right;">
          <div style="font-size:11px;color:var(--text-tertiary);">Total collected</div>
          <div style="font-size:18px;font-weight:500;color:var(--text-primary);">$${total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
      </div>
    </div>
    <div id="pay-chart-wrap" style="display:none;position:relative;width:100%;height:160px;margin-bottom:14px;"><canvas id="pay-chart" role="img" aria-label="Payment history chart for ${esc(c.name)}"></canvas></div>
    <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;max-height:280px;overflow-y:auto;">
      ${rows}
    </div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="closeModal()">Close</button>
      <button class="m-save" onclick="closeModal();openMarkPaid(${clientId})">+ Record payment</button>
    </div>`);

  window._payChartInstance=null;
  window._payChartVisible=false;
  window._payChartData={
    labels:[...[...payments].sort((a,b)=>a.date.localeCompare(b.date))].map(p=>p.fmt||p.date),
    data:[...[...payments].sort((a,b)=>a.date.localeCompare(b.date))].map(p=>Number(p.amount))
  };

  window.togglePaymentChart=function(){
    const wrap=document.getElementById('pay-chart-wrap');
    const btn=document.getElementById('chart-toggle-btn');
    if(!wrap)return;
    window._payChartVisible=!window._payChartVisible;
    wrap.style.display=window._payChartVisible?'block':'none';
    btn.style.background=window._payChartVisible?'var(--bg-secondary)':'none';
    btn.style.color=window._payChartVisible?'var(--text-primary)':'var(--text-tertiary)';
    if(window._payChartVisible&&!window._payChartInstance){
      const buildChart=()=>{
        const canvas=document.getElementById('pay-chart');
        if(!canvas)return;
        window._payChartInstance=new window.Chart(canvas,{
          type:'line',
          data:{
            labels:window._payChartData.labels,
            datasets:[{label:'Payment',data:window._payChartData.data,borderColor:'#0b1d5e',backgroundColor:'rgba(11,29,94,0.08)',borderWidth:2,pointBackgroundColor:'#bc9762',pointRadius:4,tension:0.3,fill:true}]
          },
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+Number(ctx.raw).toLocaleString('en-US',{minimumFractionDigits:2})}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:8}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{callback:v=>'$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0}),font:{size:10}}}}}
        });
      };
      if(window.Chart) buildChart();
      else{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';s.onload=buildChart;document.head.appendChild(s);}
    }
  };
}

function inlineDeletePayment(clientId,payId,btn){
  const row=document.getElementById('pay-row-'+payId);
  if(!row)return;
  const orig=row.innerHTML;
  const origBg=row.style.background;
  row.style.background='var(--bg-secondary)';
  row.innerHTML=`<span style="flex:1;font-size:12px;color:var(--text-primary);">Remove this payment?</span>
    <button type="button" id="pay-cancel-${payId}" style="height:22px;padding:0 8px;border:0.5px solid var(--border-mid);border-radius:4px;background:transparent;color:var(--text-secondary);font-size:11px;cursor:pointer;font-family:var(--font);">Cancel</button>
    <button type="button" onclick="doDeletePayment(${clientId},${payId})" style="height:22px;padding:0 8px;border:none;border-radius:4px;background:#A32D2D;color:#fff;font-size:11px;cursor:pointer;font-family:var(--font);">Remove</button>`;
  document.getElementById('pay-cancel-'+payId).addEventListener('click',()=>{
    row.innerHTML=orig;
    row.style.background=origBg;
  });
}

function confirmDeletePayment(clientId,payId){inlineDeletePayment(clientId,payId);}

function doDeletePayment(clientId,payId){
  const c=S.clients.find(x=>x.id===clientId);
  if(!c||!c.payments)return;
  c.payments=c.payments.filter(p=>p.id!==payId);
  save();openPaymentHistory(clientId);
}

function openAccountingOverview(){
  const allPayments=[];
  S.clients.forEach(c=>{
    (c.payments||[]).forEach(p=>{allPayments.push({...p,clientId:c.id,clientName:c.name,ci:c.ci});});
  });

  const years=[...new Set(allPayments.map(p=>p.date.slice(0,4)))].sort().reverse();
  if(!years.length) years.push(new Date().getFullYear().toString());
  const currentYear=years[0];
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const renderOverview=(yearFilter,monthFilter,clientFilter)=>{
    let filtered=allPayments.filter(p=>{
      if(yearFilter&&p.date.slice(0,4)!==yearFilter)return false;
      if(monthFilter&&monthFilter!=='all'&&parseInt(p.date.slice(5,7))!==parseInt(monthFilter))return false;
      if(clientFilter&&clientFilter!=='all'&&String(p.clientId)!==String(clientFilter))return false;
      return true;
    });
    const total=filtered.reduce((s,p)=>s+Number(p.amount),0);

    const byClient={};
    filtered.forEach(p=>{
      if(!byClient[p.clientId]) byClient[p.clientId]={name:p.clientName,ci:p.ci,total:0,count:0};
      byClient[p.clientId].total+=Number(p.amount);
      byClient[p.clientId].count++;
    });

    const clientRows=Object.entries(byClient).sort((a,b)=>b[1].total-a[1].total).map(([id,d])=>{
      const col=COLORS[d.ci%COLORS.length];
      return`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:0.5px solid var(--border-light);">
        <div class="avatar" style="width:26px;height:26px;font-size:10px;background:${col.bg};color:${col.txt};">${ini(d.name)}</div>
        <span style="flex:1;font-size:13px;color:var(--text-primary);">${esc(d.name)}</span>
        <span style="font-size:11px;color:var(--text-tertiary);margin-right:8px;">${d.count} payment${d.count!==1?'s':''}</span>
        <span style="font-size:13px;font-weight:500;color:var(--text-primary);">$${d.total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
      </div>`;
    }).join('')||'<div style="padding:16px;text-align:center;font-size:13px;color:var(--text-tertiary);font-style:italic;">No payments for this period.</div>';

    const yearOpts=years.map(y=>`<option value="${y}"${y===yearFilter?' selected':''}>${y}</option>`).join('');
    const monthOpts=['<option value="all"'+(monthFilter==='all'?' selected':'')+'>All months</option>',
      ...monthNames.map((m,i)=>`<option value="${i+1}"${parseInt(monthFilter)===i+1?' selected':''}>${m}</option>`)].join('');
    const clientOpts=['<option value="all"'+(clientFilter==='all'?' selected':'')+'>All clients</option>',
      ...S.clients.map(c=>`<option value="${c.id}"${String(clientFilter)===String(c.id)?' selected':''}>${esc(c.name)}</option>`)].join('');

    const el=document.getElementById('acc-overview-body');
    if(el) el.innerHTML=`
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
        <select onchange="window._accState.year=this.value;window._reloadOverview()" style="height:34px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);">${yearOpts}</select>
        <select onchange="window._accState.month=this.value;window._reloadOverview()" style="height:34px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);">${monthOpts}</select>
        <select onchange="window._accState.client=this.value;window._reloadOverview()" style="height:34px;padding:0 10px;border:0.5px solid var(--border-mid);border-radius:var(--radius-md);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:var(--font);">${clientOpts}</select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
        <div class="detail-card"><div class="detail-card-title">Total collected</div><div style="font-size:20px;font-weight:500;color:var(--text-primary);margin-top:4px;">$${total.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
        <div class="detail-card"><div class="detail-card-title">Payments</div><div style="font-size:20px;font-weight:500;color:var(--text-primary);margin-top:4px;">${filtered.length}</div></div>
      </div>
      <div style="border:0.5px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;">
        <div style="padding:8px 12px;background:var(--bg-secondary);border-bottom:0.5px solid var(--border-light);font-size:11px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.04em;">By client</div>
        ${clientRows}
      </div>`;
  };

  window._accState={year:currentYear,month:'all',client:'all'};
  window._reloadOverview=()=>renderOverview(window._accState.year,window._accState.month,window._accState.client);

  showModal(`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <h3 style="flex:1;">Payment overview</h3>
    </div>
    <div id="acc-overview-body"></div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="m-cancel" onclick="closeModal()">Close</button>
    </div>`);

  setTimeout(()=>renderOverview(currentYear,'all','all'),0);
}
